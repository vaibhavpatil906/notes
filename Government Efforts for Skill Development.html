// Build tabs & panels
const tabsEl = document.getElementById('tabs');
const panelsEl = document.getElementById('panels');

topics.forEach((t, i) => {
  const tab = document.createElement('button');
  tab.className = 'tab' + (i===0?' active':'');
  tab.dataset.id = t.id;
  tab.innerHTML = `${t.icon} ${t.title}`;
  tabsEl.appendChild(tab);

  const panel = document.createElement('div');
  panel.className = 'panel' + (i===0?' active':'');
  panel.id = 'panel-' + t.id;

  let subHTML = '';
  t.subtopics.forEach((s, si) => {
    subHTML += `
      <div class="card" id="card-${t.id}-${si}">
        <div class="card-head" onclick="toggleCard('${t.id}-${si}')">
          <span class="card-head-title" style="color:${t.color}">${s.title}</span>
          <span class="card-toggle" style="color:${t.color}">+</span>
        </div>
        <div class="card-body">
          <ul>${s.points.map(p=>`<li>${p}</li>`).join('')}</ul>
        </div>
      </div>`;
  });

  panel.innerHTML = `
    <div class="panel-header" style="background:${t.color}18;border:1.5px solid ${t.color}44">
      <span class="panel-icon">${t.icon}</span>
      <span class="panel-title" style="color:${t.color}">${t.title}</span>
    </div>
    <div class="subtopics">${subHTML}</div>`;
  panelsEl.appendChild(panel);
});

// Recall
const recallEl = document.getElementById('recall');
recallFacts.forEach(f => {
  recallEl.innerHTML += `<div class="recall-card"><div class="recall-label">${f.label}</div><div class="recall-val">${f.val}</div></div>`;
});

// Tab switch
tabsEl.addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if(!tab) return;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  tab.classList.add('active');
  document.getElementById('panel-'+tab.dataset.id).classList.add('active');
});

function toggleCard(id) {
  document.getElementById('card-'+id).classList.toggle('open');
}
