let answered=0,correct=0;
function buildFilters(){
  const secs=[...new Set(data.map(d=>d.s))];
  const sel=document.getElementById('secFilter');
  secs.forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s;sel.appendChild(o);});
}
function renderAll(filtered){
  const c=document.getElementById('qContainer');
  const nR=document.getElementById('noResults');
  if(!filtered.length){c.innerHTML='';nR.style.display='block';return;}
  nR.style.display='none';
  let html='';let lastSec='';
  filtered.forEach((item,i)=>{
    const origIdx=data.indexOf(item);
    if(item.s!==lastSec){html+=`<div class="sec-label">📂 ${item.s}</div>`;lastSec=item.s;}
    html+=`<div class="mcq" id="mcq${origIdx}">
      <div class="qno">Q${origIdx+1} • ${item.s}</div>
      <div class="qtxt">${item.q.replace(/\n/g,'<br>')}</div>
      <div class="opts">
        ${item.o.map((o,j)=>`<div class="opt" onclick="check(${origIdx},${j},this)">${String.fromCharCode(65+j)}) ${o}</div>`).join('')}
      </div>
    </div>`;
  });
  c.innerHTML=html;
}
function filterQ(){
  const sec=document.getElementById('secFilter').value;
  const srch=document.getElementById('srch').value.toLowerCase();
  let filtered=data;
  if(sec) filtered=filtered.filter(d=>d.s===sec);
  if(srch) filtered=filtered.filter(d=>d.q.toLowerCase().includes(srch)||d.o.some(o=>o.toLowerCase().includes(srch)));
  renderAll(filtered);
}
function check(qi,optIdx,el){
  const box=el.closest('.mcq');
  if(box.querySelector('.correct')) return;
  box.querySelectorAll('.opt').forEach(o=>o.classList.add('disabled'));
  box.querySelectorAll('.opt')[data[qi].a].classList.add('correct');
  if(optIdx!==data[qi].a) el.classList.add('wrong');
  else correct++;
  answered++;
  updateStats();
}
function updateStats(){
  document.getElementById('sAns').textContent=answered;
  document.getElementById('sCorr').textContent=correct;
  document.getElementById('sAcc').textContent=answered?Math.round(correct/answered*100)+'%':'0%';
  document.getElementById('progBar').style.width=Math.round(answered/data.length*100)+'%';
}
function revealAll(){
  document.querySelectorAll('.mcq').forEach((box,i)=>{
    if(box.querySelector('.correct')) return;
    const qi=parseInt(box.id.replace('mcq',''));
    box.querySelectorAll('.opt').forEach(o=>o.classList.add('disabled'));
    box.querySelectorAll('.opt')[data[qi].a].classList.add('correct');
  });
}
function resetAll(){
  answered=0;correct=0;
  document.querySelectorAll('.opt').forEach(o=>{o.classList.remove('correct','wrong','disabled');});
  updateStats();
}
buildFilters();
filterQ();
</script>
</body>
</html>
