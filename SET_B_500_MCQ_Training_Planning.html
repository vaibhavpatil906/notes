<style>
:root{

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

.stats-bar{display:flex;gap:20px;align-items:center;flex-wrap:wrap}
.stat{text-align:center}
.stat-val{font-family:'Exo 2',sans-serif;font-size:22px;font-weight:700;line-height:1;color:#60a5fa}
.stat-lbl{font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:0.5px}
.controls{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;box-shadow:0 1px 3px rgba(0,0,0,.06)}

.btn-primary{background:var(--accent);color:#fff}

.btn-secondary{background:var(--border);color:var(--text)}

.btn-teal:hover{background:#0e7490}
select{background:var(--surface);color:var(--text);border:1px solid var(--border);padding:7px 12px;border-radius:4px;font-size:13px;font-family:'DM Sans',sans-serif}
.search-box{background:var(--surface);color:var(--text);border:1px solid var(--border);padding:7px 12px;border-radius:4px;font-size:13px;width:220px}
.search-box::placeholder{color:var(--muted)}
.progress-wrap{background:var(--surface);padding:10px 24px;border-bottom:1px solid var(--border)}
.progress-info{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:6px}
.progress-bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden}

.score-panel{background:var(--dark);border:1px solid #1e3a6e;margin:16px 24px;border-radius:8px;padding:16px;display:none;justify-content:space-around;flex-wrap:wrap;gap:12px}

.score-big.green{color:#4ade80}
.score-big.red{color:#f87171}
.score-big.blue{color:#60a5fa}
.score-big.cyan{color:#22d3ee}
main{padding:16px 24px;max-width:960px;margin:0 auto}

.section-divider::before{content:'';display:inline-block;width:8px;height:8px;background:var(--accent);border-radius:50%}
.qcard{background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:10px;overflow:hidden;transition:all .2s;box-shadow:0 1px 3px rgba(0,0,0,.05)}

.qcard.answered-correct{border-left:4px solid var(--correct);background:#f0fdf4}
.qcard.answered-wrong{border-left:4px solid var(--wrong);background:#fff5f5}
.qhead{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;cursor:pointer}
.qnum{font-family:'Exo 2',sans-serif;font-weight:800;font-size:13px;color:var(--accent);min-width:36px;padding-top:1px}
.qtext{font-size:14px;color:var(--text);line-height:1.6;flex:1;font-weight:500}
.opts{padding:0 16px 14px 64px;display:none}
.opt{display:flex;align-items:center;gap:10px;padding:9px 12px;margin-bottom:5px;border-radius:6px;cursor:pointer;border:1.5px solid var(--border);font-size:13.5px;transition:all .15s;color:var(--text)}

.opt.wrong .opt-letter{background:var(--wrong);color:#fff}

.chip-nt{background:#dbeafe;color:#1e40af}
@media(max-width:600px){
  main{padding:10px 12px}

// State
let userAnswers = {};
let currentFilter = 'all';
let currentSearch = '';
let visibleQs = [];

function getFilteredIndices(){
  return Q.map((_,i)=>i).filter(i=>{
    const q=Q[i];
    const sMatch=currentFilter==='all'||q.s===currentFilter;
    const search=currentSearch.toLowerCase();
    const tMatch=!search||q.q.toLowerCase().includes(search)||q.o.some(o=>o.toLowerCase().includes(search));
    return sMatch&&tMatch;
  });
}

function render(){
  visibleQs=getFilteredIndices();
  const main=document.getElementById('mainContent');
  main.innerHTML='';
  const groups={};
  visibleQs.forEach(i=>{const s=Q[i].s;if(!groups[s])groups[s]=[];groups[s].push(i);});
  let num=0;
  Object.keys(groups).forEach(sec=>{
    const div=document.createElement('div');
    div.innerHTML=`<div class="section-divider">${sec}</div>`;
    groups[sec].forEach(i=>{num++;div.appendChild(buildCard(i,num));});
    main.appendChild(div);
  });
  document.getElementById('totalQ').textContent=visibleQs.length;
  updateProgress();
}

function buildCard(i,num){
  const q=Q[i];
  const chipClass=SECTIONS[q.s]||'chip-tc';
  const answered=userAnswers[i]!==undefined;
  const correct=answered&&userAnswers[i]===q.a;
  const card=document.createElement('div');
  card.className=`qcard${answered?(correct?' answered-correct':' answered-wrong'):''}`;
  card.id=`card-${i}`;
  const optsHtml=q.o.map((opt,j)=>{
    let cls='opt';
    if(answered){if(j===q.a)cls+=' correct';else if(j===userAnswers[i])cls+=' wrong';}
    const letter=['A','B','C','D'][j];
    return `<div class="${cls}" onclick="answer(${i},${j})"><span class="opt-letter">${letter}</span>${opt}</div>`;
  }).join('');
  let revealHtml='';
  if(answered){
    revealHtml=`<div class="ans-reveal ${correct?'correct-msg':'wrong-msg'}" style="display:block">${correct?'✓ Correct!':'✗ Wrong.'} Answer: ${q.o[q.a]}</div>`;
  }
  card.innerHTML=`
    <div class="qhead" onclick="toggleOpts(${i})">
      <span class="qnum">Q${num}</span>
      <span class="qtext">${q.q}<span class="chip ${chipClass}">${q.s.split(' ')[0]}</span></span>
    </div>
    <div class="opts" id="opts-${i}" style="${answered?'display:block':'display:none'}">${optsHtml}${revealHtml}</div>`;
  return card;
}

function toggleOpts(i){
  const el=document.getElementById(`opts-${i}`);
  el.style.display=el.style.display==='none'?'block':'none';
}

function answer(i,j){
  if(userAnswers[i]!==undefined)return;
  userAnswers[i]=j;
  const q=Q[i];
  const optsEl=document.getElementById(`opts-${i}`);
  optsEl.querySelectorAll('.opt').forEach((opt,k)=>{
    opt.onclick=null;
    if(k===q.a){opt.classList.add('correct');opt.querySelector('.opt-letter').style.background='var(--correct)';opt.querySelector('.opt-letter').style.color='#fff';}
    else if(k===j){opt.classList.add('wrong');opt.querySelector('.opt-letter').style.background='var(--wrong)';opt.querySelector('.opt-letter').style.color='#fff';}
  });
  const isCorrect=j===q.a;
  const reveal=document.createElement('div');
  reveal.className=`ans-reveal ${isCorrect?'correct-msg':'wrong-msg'}`;
  reveal.style.display='block';
  reveal.textContent=`${isCorrect?'✓ Correct!':'✗ Wrong.'} Answer: ${q.o[q.a]}`;
  optsEl.appendChild(reveal);
  document.getElementById(`card-${i}`).classList.add(isCorrect?'answered-correct':'answered-wrong');
  updateProgress();
}

function updateProgress(){
  const ans=Object.keys(userAnswers).filter(k=>visibleQs.includes(parseInt(k))).length;
  const cor=Object.keys(userAnswers).filter(k=>visibleQs.includes(parseInt(k))&&userAnswers[k]===Q[k].a).length;
  const total=visibleQs.length;
  const pct=total?Math.round(ans/total*100):0;
  const scorePct=ans?Math.round(cor/ans*100):0;
  document.getElementById('answeredCount').textContent=ans;
  document.getElementById('correctCount').textContent=cor;
  document.getElementById('scorePercent').textContent=scorePct+'%';
  document.getElementById('progressText').textContent=`${ans} of ${total} answered`;
  document.getElementById('progressPct').textContent=pct+'%';
  document.getElementById('progressFill').style.width=pct+'%';
}

function filterSection(){currentFilter=document.getElementById('sectionFilter').value;render();}
function searchQ(){currentSearch=document.getElementById('searchBox').value;render();}
function showAll(){currentFilter='all';currentSearch='';document.getElementById('sectionFilter').value='all';document.getElementById('searchBox').value='';render();}
function resetAll(){if(!confirm('Reset all answers?'))return;userAnswers={};render();document.getElementById('scorePanel').style.display='none';}

function showScore(){
  const panel=document.getElementById('scorePanel');
  const allAns=Object.keys(userAnswers).length;
  const allCor=Object.keys(userAnswers).filter(k=>userAnswers[k]===Q[k].a).length;
  const allWrong=allAns-allCor;
  const pct=allAns?Math.round(allCor/allAns*100):0;
  let grade=pct>=90?'A+':pct>=80?'A':pct>=70?'B':pct>=60?'C':pct>=50?'D':'F';
  document.getElementById('sp-total').textContent=allAns;
  document.getElementById('sp-correct').textContent=allCor;
  document.getElementById('sp-wrong').textContent=allWrong;
  document.getElementById('sp-pct').textContent=pct+'%';
  document.getElementById('sp-grade').textContent=grade;
  panel.style.display=panel.style.display==='flex'?'none':'flex';
  panel.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function revealAll(){
  if(!confirm('Reveal all correct answers?'))return;
  visibleQs.forEach(i=>{
    const optsEl=document.getElementById(`opts-${i}`);
    if(!optsEl)return;
    optsEl.style.display='block';
    optsEl.querySelectorAll('.opt').forEach((opt,k)=>{
      opt.onclick=null;
      if(k===Q[i].a){opt.classList.add('correct');opt.querySelector('.opt-letter').style.background='var(--correct)';opt.querySelector('.opt-letter').style.color='#fff';}
    });
  });
}

render();
</script>
