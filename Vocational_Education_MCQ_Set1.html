<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocational Education — 500 MCQs Set 1 | Ignite Academy</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Sans+3:wght@300;400;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0f14;--s1:#151820;--s2:#1c2030;--s3:#232840;--red:#e05252;--dred:#c0392b;--gold:#f0b429;--border:#2a2f45;--borderb:#3a4060;--text:#d0d8f0;--textd:#7a85a8;--textb:#eef2ff;--green:#3dba7a;--greenbg:#0a1f15;--blue:#4a9eda;--bluebg:#0a1525;--purple:#a07ee0;--purplebg:#150e28;}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Source Sans 3',sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.7;}
::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--borderb);border-radius:3px;}

header{background:linear-gradient(135deg,#0a0c12,#131828,#1a1030);padding:36px 40px 28px;border-bottom:1px solid var(--borderb);position:relative;overflow:hidden;}
header::before{content:'';position:absolute;top:-60px;right:-60px;width:260px;height:260px;border-radius:50%;background:radial-gradient(circle,rgba(224,82,82,0.15) 0%,transparent 70%);}
header h1{font-family:'Playfair Display',serif;font-size:2.2rem;color:var(--textb);position:relative;z-index:1;text-shadow:0 0 30px rgba(74,158,218,0.25);}
header .sub{font-size:0.8rem;color:var(--textd);letter-spacing:3px;text-transform:uppercase;margin-top:6px;position:relative;z-index:1;}
header .badges{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;position:relative;z-index:1;}
.badge{padding:4px 14px;border-radius:20px;font-size:0.72rem;font-weight:700;letter-spacing:1px;border:1px solid;}
.badge.red{background:linear-gradient(135deg,var(--dred),#6b1010);color:white;border-color:rgba(224,82,82,0.3);}
.badge.gold{background:linear-gradient(135deg,#7a5a00,#4a3600);color:var(--gold);border-color:rgba(240,180,41,0.3);}
.badge.blue{background:linear-gradient(135deg,#0a3060,#061825);color:var(--blue);border-color:rgba(74,158,218,0.3);}

.stats-bar{background:var(--s1);border-bottom:1px solid var(--border);padding:14px 40px;display:flex;gap:32px;align-items:center;flex-wrap:wrap;position:sticky;top:0;z-index:100;}
.stat{display:flex;align-items:center;gap:8px;font-size:0.82rem;color:var(--textd);}
.stat strong{color:var(--textb);font-family:'Fira Code',monospace;font-size:0.9rem;}
.stat .dot{width:8px;height:8px;border-radius:50%;}
.score-display{margin-left:auto;font-family:'Fira Code',monospace;font-size:1rem;color:var(--gold);font-weight:700;}
.progress-bar{height:3px;background:var(--border);position:relative;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--dred),var(--gold),var(--blue));transition:width 0.3s;width:0%;}

.container{max-width:900px;margin:0 auto;padding:28px 24px 60px;}

.controls{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap;}
.btn{padding:8px 18px;border-radius:8px;border:1px solid var(--borderb);background:var(--s2);color:var(--text);font-size:0.82rem;cursor:pointer;transition:all 0.2s;font-family:'Source Sans 3',sans-serif;font-weight:600;}
.btn:hover{background:var(--s3);color:var(--textb);border-color:var(--gold);}
.btn.primary{background:linear-gradient(135deg,var(--dred),#6b1010);color:white;border-color:rgba(224,82,82,0.4);}
.btn.primary:hover{box-shadow:0 0 16px rgba(224,82,82,0.3);}
.btn.success{background:linear-gradient(135deg,#1a6040,#0a3020);color:var(--green);border-color:rgba(61,186,122,0.3);}

.chapter-nav{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;}
.ch-btn{padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:var(--s1);color:var(--textd);font-size:0.75rem;cursor:pointer;transition:all 0.2s;font-family:'Fira Code',monospace;}
.ch-btn:hover,.ch-btn.active{background:var(--purplebg);color:var(--purple);border-color:rgba(160,126,224,0.4);}

.search-box{width:100%;padding:10px 16px;border-radius:8px;border:1px solid var(--borderb);background:var(--s2);color:var(--textb);font-size:0.88rem;margin-bottom:20px;font-family:'Source Sans 3',sans-serif;}
.search-box:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 2px rgba(74,158,218,0.1);}
.search-box::placeholder{color:var(--textd);}

.mcq-card{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:22px 26px;margin-bottom:14px;transition:border-color 0.2s;position:relative;}
.mcq-card:hover{border-color:var(--borderb);}
.mcq-card.answered-correct{border-color:rgba(61,186,122,0.4);background:linear-gradient(135deg,var(--s1),rgba(61,186,122,0.04));}
.mcq-card.answered-wrong{border-color:rgba(224,82,82,0.3);background:linear-gradient(135deg,var(--s1),rgba(224,82,82,0.04));}

.q-header{display:flex;align-items:flex-start;gap:14px;margin-bottom:16px;}
.q-num{font-family:'Fira Code',monospace;font-size:0.72rem;color:var(--textd);background:var(--s3);padding:3px 9px;border-radius:6px;border:1px solid var(--border);flex-shrink:0;margin-top:2px;}
.q-tag{font-family:'Fira Code',monospace;font-size:0.68rem;background:var(--purplebg);color:var(--purple);padding:2px 8px;border-radius:8px;border:1px solid rgba(160,126,224,0.3);flex-shrink:0;margin-top:2px;}
.q-text{font-size:0.93rem;color:var(--textb);font-weight:600;line-height:1.55;}

.options{display:grid;gap:8px;}
.option{padding:10px 14px;border-radius:8px;border:1px solid var(--border);background:var(--s2);color:var(--text);font-size:0.87rem;cursor:pointer;transition:all 0.2s;display:flex;align-items:flex-start;gap:10px;text-align:left;}
.option:hover:not(.disabled){border-color:var(--blue);color:var(--textb);background:rgba(74,158,218,0.07);}
.option .opt-label{font-family:'Fira Code',monospace;font-size:0.72rem;color:var(--textd);background:var(--s3);padding:1px 6px;border-radius:4px;flex-shrink:0;margin-top:1px;}
.option.correct{border-color:var(--green);background:rgba(61,186,122,0.1);color:var(--green);}
.option.correct .opt-label{background:rgba(61,186,122,0.2);color:var(--green);}
.option.wrong{border-color:var(--red);background:rgba(224,82,82,0.1);color:var(--red);}
.option.wrong .opt-label{background:rgba(224,82,82,0.2);color:var(--red);}
.option.disabled{cursor:default;}

.explanation{margin-top:12px;padding:12px 16px;background:var(--greenbg);border:1px solid rgba(61,186,122,0.2);border-radius:8px;font-size:0.83rem;color:var(--text);display:none;}
.explanation.show{display:block;}
.explanation strong{color:var(--green);}

.section-divider{margin:32px 0;padding:16px 20px;background:var(--s2);border:1px solid var(--borderb);border-radius:10px;display:flex;align-items:center;gap:12px;}
.section-divider .sec-icon{font-size:1.4rem;}
.section-divider h3{font-family:'Playfair Display',serif;color:var(--gold);font-size:1.1rem;}
.section-divider .sec-count{font-family:'Fira Code',monospace;font-size:0.72rem;color:var(--textd);margin-left:auto;}

.result-panel{background:var(--s1);border:1px solid var(--borderb);border-radius:14px;padding:28px;margin:24px 0;text-align:center;display:none;}
.result-panel.show{display:block;}
.result-score{font-family:'Playfair Display',serif;font-size:3rem;color:var(--gold);margin-bottom:8px;}
.result-sub{color:var(--textd);font-size:0.9rem;}

.hidden{display:none!important;}
.fade-in{animation:fadeIn 0.3s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>

<header>
  <h1>📚 Vocational Education — MCQ Set 1</h1>
  <div class="sub">Questions 1–500 · Ignite Academy · Exam Preparation</div>
  <div class="badges">
    <span class="badge red">500 Questions</span>
    <span class="badge gold">All Topics Covered</span>
    <span class="badge blue">Interactive Quiz</span>
  </div>
</header>

<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

<div class="stats-bar">
  <div class="stat"><div class="dot" style="background:var(--green)"></div>Correct: <strong id="correctCount">0</strong></div>
  <div class="stat"><div class="dot" style="background:var(--red)"></div>Wrong: <strong id="wrongCount">0</strong></div>
  <div class="stat"><div class="dot" style="background:var(--textd)"></div>Remaining: <strong id="remainCount">500</strong></div>
  <div class="score-display" id="scoreDisplay">Score: 0%</div>
</div>

<div class="container">
  <div class="controls">
    <button class="btn primary" onclick="revealAll()">Show All Answers</button>
    <button class="btn success" onclick="resetAll()">Reset Quiz</button>
    <button class="btn" onclick="showResults()">View Score</button>
  </div>

  <div class="chapter-nav" id="chapterNav">
    <button class="ch-btn active" onclick="filterChapter('all',this)">All</button>
    <button class="ch-btn" onclick="filterChapter('definition',this)">Definition</button>
    <button class="ch-btn" onclick="filterChapter('iti',this)">ITI</button>
    <button class="ch-btn" onclick="filterChapter('history',this)">History</button>
    <button class="ch-btn" onclick="filterChapter('supw',this)">SUPW</button>
    <button class="ch-btn" onclick="filterChapter('pmkvy',this)">PMKVY</button>
    <button class="ch-btn" onclick="filterChapter('schemes',this)">Schemes</button>
    <button class="ch-btn" onclick="filterChapter('maharashtra',this)">Maharashtra</button>
    <button class="ch-btn" onclick="filterChapter('problems',this)">Problems</button>
  </div>

  <input type="text" class="search-box" id="searchBox" placeholder="🔍  Search questions..." oninput="searchQuestions()">

  <div class="result-panel" id="resultPanel">
    <div class="result-score" id="resultScore">0/0</div>
    <div class="result-sub" id="resultSub">Complete more questions to see your score</div>
  </div>

  <div id="mcqContainer"></div>
</div>

<script>
const questions = [
// ── DEFINITION & BASICS (Q1-60) ──
{n:1,cat:'definition',tag:'Definition',q:'Vocational Education is primarily based on:',opts:['A. Theory and research','B. Occupation and employment','C. General knowledge','D. Academic subjects'],ans:'B',exp:'VE is defined as education based on occupation and employment.'},
{n:2,cat:'definition',tag:'Definition',q:'Another name for Vocational Education is:',opts:['A. Liberal Arts Education','B. Career and Technical Education (CTE)','C. Classical Education','D. Formal Education'],ans:'B',exp:'VE is also known as Career and Technical Education (CTE).'},
{n:3,cat:'definition',tag:'Definition',q:'The abbreviation TVET stands for:',opts:['A. Technical and Vocational Education and Training','B. Trade Vocational Education Theory','C. Technical Vocational Examination Training','D. Trade and Vocational Education Technology'],ans:'A',exp:'TVET = Technical and Vocational Education and Training.'},
{n:4,cat:'definition',tag:'Definition',q:'VE is sometimes referred to as Technical Education because:',opts:['A. It is taught in technical colleges only','B. The trainee develops expertise in a particular group of techniques','C. It focuses on engineering subjects','D. It requires a technical degree'],ans:'B',exp:'The trainee directly develops expertise in a particular group of techniques.'},
{n:5,cat:'definition',tag:'Definition',q:'Which of the following is NOT a system of VET in India?',opts:['A. Industrial Training Institutes','B. Polytechnic Institutes','C. Medical Colleges','D. Apprenticeship Training'],ans:'C',exp:'Medical Colleges are not part of VET systems. ITIs, Polytechnics, and Apprenticeship Training are.'},
{n:6,cat:'definition',tag:'Definition',q:'Vocational Education bridges the gap between:',opts:['A. Rich and poor students','B. Urban and rural areas','C. Industry demands and workforce skills','D. Government and private sector'],ans:'C',exp:'VE focuses on bridging the skill gap between industry demands and workforce skills.'},
{n:7,cat:'definition',tag:'Definition',q:'VE enhances chances of:',opts:['A. Higher academic degrees only','B. Gainful employment or self-employment','C. Government jobs only','D. International migration'],ans:'B',exp:'VE enhances chances of finding gainful employment or becoming self-employed.'},
{n:8,cat:'definition',tag:'Definition',q:'VE helps alleviate poverty by:',opts:['A. Providing free food','B. Offering scholarships','C. Empowering individuals to secure better-paying jobs','D. Reducing taxes'],ans:'C',exp:'By providing practical skills, VE empowers individuals to secure better-paying jobs or start businesses.'},
{n:9,cat:'definition',tag:'Definition',q:'The National Skills Qualification Framework is abbreviated as:',opts:['A. NSVF','B. NSQF','C. NSKF','D. NQSF'],ans:'B',exp:'NSQF = National Skills Qualification Framework.'},
{n:10,cat:'definition',tag:'Definition',q:'VE increases which of the following?',opts:['A. Inflation','B. Industry productivity','C. Academic degree holders','D. Government expenditure'],ans:'B',exp:'VE is aligned with industry needs and helps increase industry productivity.'},
{n:11,cat:'definition',tag:'Definition',q:'Vocational Education caters to learners who excel in:',opts:['A. Reading and writing only','B. Mathematical calculations','C. Hands-on, practical learning environments','D. Theoretical knowledge'],ans:'C',exp:'VE caters to a broader spectrum of learners including those who excel in hands-on, practical learning.'},
{n:12,cat:'definition',tag:'Definition',q:'Which abbreviation represents Career and Technical Education?',opts:['A. CTE','B. CVE','C. TCE','D. ETC'],ans:'A',exp:'CTE = Career and Technical Education, an alternative name for Vocational Education.'},
{n:13,cat:'definition',tag:'Definition',q:'VE prepares people for:',opts:['A. Research and development only','B. Specific trades, crafts, and careers','C. Political leadership','D. Teaching only'],ans:'B',exp:'VE prepares people for specific trades, crafts, and careers at various levels.'},
{n:14,cat:'definition',tag:'Definition',q:'The 5 systems of VET in India include all EXCEPT:',opts:['A. NSQF','B. ITIs','C. Polytechnic Institutes','D. UPSC coaching'],ans:'D',exp:'UPSC coaching is not a VET system. The 5 systems are ITIs, Apprenticeship, Polytechnics, Skill Dev Initiatives, NSQF.'},
{n:15,cat:'definition',tag:'Definition',q:'VE is aligned with the needs of:',opts:['A. Government ministries','B. Academic universities','C. Industry','D. International organizations'],ans:'C',exp:'VE is in alignment with the needs of industry, helping increase productivity.'},
{n:16,cat:'definition',tag:'Definition',q:'Which type of education directly develops expertise in a particular group of techniques?',opts:['A. General Education','B. Liberal Education','C. Technical/Vocational Education','D. Classical Education'],ans:'C',exp:'Technical/Vocational Education is where the trainee directly develops expertise in techniques.'},
{n:17,cat:'definition',tag:'Definition',q:'VE offers an alternative route for students who may excel in:',opts:['A. Board examinations','B. Competitive exams','C. Practical learning environments','D. Distance learning'],ans:'C',exp:'VE offers an alternative route for those who excel in hands-on, practical learning environments.'},
{n:18,cat:'definition',tag:'Definition',q:'Which of the following is a benefit of VE?',opts:['A. Only improves literacy','B. Encourages migration abroad','C. Reduces dropout rates at primary level','D. Improves standard of living by empowering individuals'],ans:'D',exp:'VE can improve standard of living by empowering individuals to secure better jobs.'},
{n:19,cat:'definition',tag:'Definition',q:'VE in India is important because India has:',opts:['A. A small workforce','B. A vast workforce with skill gaps','C. No industrial base','D. Too many engineers'],ans:'B',exp:'India has a vast workforce, but there is a gap between industry demands and workforce skills.'},
{n:20,cat:'definition',tag:'Definition',q:'TVET is provided through how many main systems in India?',opts:['A. Three','B. Four','C. Five','D. Six'],ans:'C',exp:'Five systems: ITIs, Apprenticeship, Polytechnics, Skill Development Initiatives, NSQF.'},

// ── ITI ECOSYSTEM (Q21-120) ──
{n:21,cat:'iti',tag:'ITI',q:'DGT stands for:',opts:['A. Directorate General of Training','B. Department of General Teaching','C. Directorate of Government Technology','D. Department of Graduate Training'],ans:'A',exp:'DGT = Directorate General of Training.'},
{n:22,cat:'iti',tag:'ITI',q:'DGT is the national-level apex organization for:',opts:['A. Agricultural training','B. Development and coordination of vocational training','C. Medical education','D. University education'],ans:'B',exp:'DGT is the national-level apex organization for development & coordination of vocational training.'},
{n:23,cat:'iti',tag:'ITI',q:'DGT operates the:',opts:['A. Education Act, 1947','B. Apprenticeship Act, 1961','C. Skill Development Act, 2000','D. Employment Act, 1975'],ans:'B',exp:'DGT operates the Apprenticeship Act, 1961.'},
{n:24,cat:'iti',tag:'ITI',q:'In 2015, DGT was transferred from MoLE to:',opts:['A. Ministry of Education','B. Ministry of Finance','C. MSDE','D. Ministry of Rural Development'],ans:'C',exp:'DGT was transferred in 2015 from Ministry of Labour & Employment to MSDE.'},
{n:25,cat:'iti',tag:'ITI',q:'MoLE stands for:',opts:['A. Ministry of Land and Environment','B. Ministry of Labour and Employment','C. Ministry of Law and Enforcement','D. Ministry of Labour and Education'],ans:'B',exp:'MoLE = Ministry of Labour & Employment.'},
{n:26,cat:'iti',tag:'ITI',q:'MSDE stands for:',opts:['A. Ministry of Skill Development and Engineering','B. Ministry of Skill Development and Entrepreneurship','C. Ministry of Social Development and Education','D. Ministry of Sector Development and Employment'],ans:'B',exp:'MSDE = Ministry of Skill Development and Entrepreneurship.'},
{n:27,cat:'iti',tag:'ITI',q:'Before 2012, ITI accreditation was done by:',opts:['A. NSDC','B. DGT','C. DGE&T as per NCVT norms','D. QCI'],ans:'C',exp:'Before 2012, accreditation was done by DGE&T as per NCVT norms.'},
{n:28,cat:'iti',tag:'ITI',q:'In 2012, ITI accreditation responsibility was given to:',opts:['A. DGT','B. DGE&T','C. Quality Council of India (QCI)','D. NSDC'],ans:'C',exp:'In 2012, accreditation was given to Quality Council of India (QCI).'},
{n:29,cat:'iti',tag:'ITI',q:'In July 2017, ITI accreditation responsibility was shifted back to:',opts:['A. QCI','B. NCVT','C. DGT','D. NSDC'],ans:'C',exp:'In July 2017, accreditation responsibility shifted back from QCI to DGT.'},
{n:30,cat:'iti',tag:'ITI',q:'Post-2017, ITI accreditation is done once every:',opts:['A. 1 year','B. 2 years','C. 3 years','D. 5 years'],ans:'D',exp:'Post-2017, accreditation is done by DGT once every 5 years.'},
{n:31,cat:'iti',tag:'ITI',q:'NSTIs were started by DGE&T in the year:',opts:['A. 1948','B. 1950','C. 1963','D. 1970'],ans:'C',exp:'NSTIs were started by DGE&T, Ministry of Employment and Labour in 1963.'},
{n:32,cat:'iti',tag:'ITI',q:'ITOT stands for:',opts:['A. Institute for Technology and Occupational Training','B. Institute for Training of Trainers','C. Industrial Training Organisation of Trainees','D. Institute of Technical and Occupational Teaching'],ans:'B',exp:'ITOT = Institute for Training of Trainers, another name for NSTIs.'},
{n:33,cat:'iti',tag:'ITI',q:'The first Craft Instructors Training Institute was established in:',opts:['A. 1945','B. 1947','C. 1948','D. 1950'],ans:'C',exp:'The first Craft Instructors Training Institute was established in 1948.'},
{n:34,cat:'iti',tag:'ITI',q:'As per DGT website, total NSTIs existing are:',opts:['A. 12','B. 15','C. 18','D. 20'],ans:'C',exp:'Total 18 institutes — 6 government and 12 non-government.'},
{n:35,cat:'iti',tag:'ITI',q:'Out of 18 NSTIs, how many are government institutes?',opts:['A. 4','B. 6','C. 8','D. 12'],ans:'B',exp:'6 are government institutes and 12 are non-government institutes.'},
{n:36,cat:'iti',tag:'ITI',q:'In 2010, the Government allowed which entities to set up instructor training institutes?',opts:['A. Only Central Govt','B. States/UTs and private industries','C. Only NGOs','D. Only universities'],ans:'B',exp:'In 2010, States/UT governments & private industries were allowed to set up instructor training institutes.'},
{n:37,cat:'iti',tag:'ITI',q:'Craftsmen Training Scheme (CTS) was started in:',opts:['A. 1947','B. 1948','C. 1950','D. 1953'],ans:'C',exp:'Craftsmen Training Scheme (CTS) was started in 1950.'},
{n:38,cat:'iti',tag:'ITI',q:'Crafts Instructor Training Scheme (CITS) was started in:',opts:['A. 1945','B. 1948','C. 1952','D. 1955'],ans:'B',exp:'Crafts Instructors Training Scheme (CITS) was started in 1948.'},
{n:39,cat:'iti',tag:'ITI',q:'CTS primarily aims to:',opts:['A. Train instructors','B. Develop skilled workers in various trades','C. Provide university education','D. Train military personnel'],ans:'B',exp:'CTS primarily aims to provide vocational training to develop skilled workers in various trades.'},
{n:40,cat:'iti',tag:'ITI',q:'CITS focuses on training individuals to become:',opts:['A. Workers in factories','B. Government officers','C. Skilled instructors, trainers, or faculty members','D. Entrepreneurs'],ans:'C',exp:'CITS trains individuals to become skilled instructors/trainers/faculty for VET programs.'},
{n:41,cat:'iti',tag:'ITI',q:'The target audience for CTS includes:',opts:['A. Individuals seeking to become instructors','B. Individuals seeking vocational training to acquire trade skills','C. University graduates','D. School teachers'],ans:'B',exp:'CTS target: individuals seeking vocational training to acquire specific trade skills.'},
{n:42,cat:'iti',tag:'ITI',q:'The target audience for CITS comprises:',opts:['A. Students who failed Class 10','B. Individuals who completed vocational training and want to become instructors','C. University students','D. Industry professionals'],ans:'B',exp:'CITS target: those who have completed vocational training and want to become instructors.'},
{n:43,cat:'iti',tag:'ITI',q:'The ITI training lifecycle starts after clearing which exam?',opts:['A. Class 5 or Class 8','B. Class 8 or Class 10','C. Class 10 or Class 12','D. Class 12 only'],ans:'B',exp:'ITI admission requires clearing Class 8 or Class 10 school exam on merit basis.'},
{n:44,cat:'iti',tag:'ITI',q:'ITI admission is based on:',opts:['A. Entrance exam only','B. Merit','C. Donation','D. Lottery'],ans:'B',exp:'Admission to ITI courses is merit-based.'},
{n:45,cat:'iti',tag:'ITI',q:'After completing ITI course, students take:',opts:['A. Board examination','B. All India Trade Test (AITT)','C. UPSC exam','D. University exam'],ans:'B',exp:'On completion, students take the All India Trade Test (AITT).'},
{n:46,cat:'iti',tag:'ITI',q:'NTC stands for:',opts:['A. National Technical Certificate','B. National Trade Certificate','C. National Training Certificate','D. National Technology Course'],ans:'B',exp:'NTC = National Trade Certificate, awarded after passing AITT.'},
{n:47,cat:'iti',tag:'ITI',q:'National Trade Certificate is recognized for recruitment to:',opts:['A. Officer grade posts','B. Subordinate posts under Central and State Governments','C. All government posts','D. Private sector only'],ans:'B',exp:'NTC is recognized for recruitment to subordinate posts under Central and State Governments.'},
{n:48,cat:'iti',tag:'ITI',q:'ITI courses are of duration:',opts:['A. 6 months or 1 year','B. 1 year or 2 years','C. 2 years or 3 years','D. 3 years only'],ans:'B',exp:'ITI courses are 1-year or 2-year duration.'},
{n:49,cat:'iti',tag:'ITI',q:'Total number of ITIs in Maharashtra is:',opts:['A. 211','B. 311','C. 411','D. 511'],ans:'C',exp:'There are a total of 411 ITIs across Maharashtra.'},
{n:50,cat:'iti',tag:'ITI',q:'Maharashtra launched 5 new ITIs in cities including:',opts:['A. Nagpur, Nashik, Pune, Mumbai, Aurangabad','B. Mumbai, Sambhaji Nagar, Pune, Nagpur, Nashik','C. Mumbai, Kolhapur, Nashik, Solapur, Nagpur','D. Pune, Mumbai, Thane, Nashik, Aurangabad'],ans:'B',exp:'5 new ITIs: one each in Mumbai, Sambhaji Nagar, Pune, Nagpur, and Nashik.'},
{n:51,cat:'iti',tag:'ITI',q:'The 5 new ITIs in Maharashtra also teach:',opts:['A. Yoga and meditation','B. Foreign languages for non-English speaking countries','C. Classical music','D. Ancient history'],ans:'B',exp:'Apart from skill-based training, foreign languages are taught especially for Europe and Asia.'},
{n:52,cat:'iti',tag:'ITI',q:'IMC stands for:',opts:['A. Industrial Management Council','B. Institute Management Committee','C. International Manufacturing Corporation','D. Industrial Monitoring Committee'],ans:'B',exp:'IMC = Institute Management Committee.'},

{n:101,cat:'history',tag:'History',q:'Wood\'s Despatch of 1854 highlighted the need for VE at which level?',opts:['A. Primary school stage','B. Secondary school stage','C. University stage','D. Post-graduate stage'],ans:'B',exp:'Wood\'s Despatch of 1854 highlighted the need for introducing VE at the secondary school stage.'},

{n:150,cat:'history',tag:'History',q:'In 2016, National Policy for Skill Development emphasized:',opts:['A. Separation of VE from academics','B. Integration of VE with academic pathways','C. Abolishing VE','D. Making VE compulsory for all'],ans:'B',exp:'2016 National Policy emphasized integration of vocational education with academic pathways.'},
{n:151,cat:'history',tag:'History',q:'The +2 stage of education should be regarded as:',opts:['A. College preparatory only','B. A period for preparing school leavers for different vocations','C. Research preparation','D. Examination preparation'],ans:'B',exp:'CABE reiterated that +2 stage should be a period for preparing school leavers for different vocations.'},
{n:152,cat:'history',tag:'History',q:'B.Voc is a course after:',opts:['A. Class 10','B. Class 12','C. Graduation','D. Class 8'],ans:'B',exp:'Bachelor of Vocation (B.Voc) is a 3-year undergraduate course after Class 12.'},
{n:153,cat:'history',tag:'History',q:'B.Voc course duration is:',opts:['A. 1 year','B. 2 years','C. 3 years','D. 4 years'],ans:'C',exp:'B.Voc is a 3-year undergraduate course.'},
{n:154,cat:'history',tag:'History',q:'B.Voc covers fields including all EXCEPT:',opts:['A. Healthcare','B. Software development','C. Classical music','D. Automobiles'],ans:'C',exp:'B.Voc covers healthcare, technology, management, automobiles, journalism, software development — not classical music.'},
{n:155,cat:'history',tag:'History',q:'Vocational courses after 10th include all EXCEPT:',opts:['A. Typewriting','B. House Keeping','C. B.Voc degree','D. Food Processing'],ans:'C',exp:'B.Voc is after 12th. After 10th: Typewriting, House Keeping, Food Processing, Catering, etc.'},
{n:156,cat:'history',tag:'History',q:'Which Commission first highlighted need for VE in the country?',opts:['A. Hunter Commission 1882','B. Wood\'s Despatch 1854','C. Kothari Commission 1964','D. Mudaliar Commission 1952'],ans:'B',exp:'Wood\'s Despatch of 1854 was the first to highlight the need for VE.'},
{n:157,cat:'history',tag:'History',q:'Samagra Shiksha Abhiyan treats pre-vocational component for which classes?',opts:['A. I to V','B. VI to VIII (foundational) up to X','C. IX to XII','D. I to X'],ans:'B',exp:'Samagra Shiksha Abhiyan & NEP 2020: Pre-vocational from Classes VI–VIII (foundational) up to Class X.'},
{n:158,cat:'history',tag:'History',q:'The CBSE pre-vocational education is offered to:',opts:['A. Class 4, 5, 6','B. Class 6, 7, 8','C. Class 9, 10','D. Class 11, 12'],ans:'B',exp:'CBSE pre-vocational education is offered to Class 6th, 7th, 8th students.'},
{n:159,cat:'history',tag:'History',q:'Soil and Fertilizer Management is a vocational course offered:',opts:['A. After Class 8','B. After Class 10','C. After Class 12','D. For B.Voc'],ans:'B',exp:'Soil and Fertilizer Management is among the courses offered after 10th.'},
{n:160,cat:'history',tag:'History',q:'IGNOU was established in:',opts:['A. 1980','B. 1983','C. 1985','D. 1987'],ans:'C',exp:'IGNOU was established in 1985.'},
{n:161,cat:'history',tag:'History',q:'IGNOU is located in:',opts:['A. Mumbai','B. Chennai','C. New Delhi','D. Bengaluru'],ans:'C',exp:'IGNOU is a public research university located at New Delhi.'},
{n:162,cat:'history',tag:'History',q:'IGNOU\'s motto is:',opts:['A. Knowledge for All','B. The People\'s University','C. Education Without Boundaries','D. Open Learning for All'],ans:'B',exp:'IGNOU\'s motto is "The People\'s University".'},
{n:163,cat:'history',tag:'History',q:'IGNOU was created under which Act?',opts:['A. Universities Act 1982','B. IGNOU Act 1985','C. Open Education Act 1986','D. Education Reform Act 1984'],ans:'B',exp:'IGNOU was created under Indira Gandhi National Open University Act, 1985.'},
{n:164,cat:'history',tag:'History',q:'The Radhakrishnan Commission emphasized VE to meet needs of:',opts:['A. Industrial sector only','B. Young men and women with vocational bias in courses','C. Engineers only','D. Medical professionals'],ans:'B',exp:'Radhakrishnan Commission emphasized VE to meet variety of needs, giving vocational bias to courses.'},
{n:165,cat:'history',tag:'History',q:'Which report formed the basis for establishment of polytechnics?',opts:['A. Sargent Report 1944','B. Wood-Abbot Advisory Committee 1936','C. Hartog Review Committee 1929','D. Hunter Commission 1882'],ans:'B',exp:'Wood-Abbot Advisory Committee (1936) report formed the basis for introducing diploma-level technical education and polytechnics.'},
{n:166,cat:'history',tag:'History',q:'The IIE (Indian Institute of Entrepreneurship) is located in:',opts:['A. New Delhi','B. Mumbai','C. Guwahati','D. Bengaluru'],ans:'C',exp:'IIE was established in 1993 in Guwahati.'},
{n:167,cat:'history',tag:'History',q:'IIE was established in:',opts:['A. 1990','B. 1991','C. 1993','D. 1995'],ans:'C',exp:'IIE was established in 1993 in Guwahati.'},
{n:168,cat:'history',tag:'History',q:'IIE was established by which Ministry?',opts:['A. Ministry of Education','B. Ministry of Industry (now MSME)','C. MSDE','D. Ministry of Labour'],ans:'B',exp:'IIE was established by the erstwhile Ministry of Industry (now Ministry of MSME).'},
{n:169,cat:'history',tag:'History',q:'IIE began operating from:',opts:['A. January 1993','B. April 1994','C. March 1995','D. June 1993'],ans:'B',exp:'IIE began operating from April 1994.'},
{n:170,cat:'history',tag:'History',q:'IIE and NIESBUD were transferred to MSDE on:',opts:['A. 2nd May 2013','B. 2nd May 2014','C. 2nd May 2015','D. 2nd May 2016'],ans:'C',exp:'IIE and NIESBUD were transferred to MSDE on 2nd May, 2015.'},
{n:171,cat:'history',tag:'History',q:'Which Commission examined problems of education as a whole, especially VE?',opts:['A. Wood-Abbot Committee','B. Indian Education Commission 1882','C. Sargent Report','D. Working Group 1977'],ans:'B',exp:'Indian Education Commission (1882) headed by Hunter examined problems of education especially VE.'},
{n:172,cat:'history',tag:'History',q:'The 10+2+3 pattern implies diversification into academic and vocational streams at:',opts:['A. +1 level','B. +2 level','C. Class 8','D. Class 10'],ans:'B',exp:'10+2+3 pattern implies diversification into academic and vocational streams at the +2 level.'},
{n:173,cat:'history',tag:'History',q:'CABE endorsed the policy resolution to adopt which education pattern?',opts:['A. 8+2+3','B. 10+2+3','C. 11+1+3','D. 10+3+2'],ans:'B',exp:'CABE endorsed the policy resolution and resolved to adopt 10+2+3 pattern of education.'},
{n:174,cat:'history',tag:'History',q:'India Skills Build Platform was developed by:',opts:['A. Microsoft','B. IBM','C. Google','D. TCS'],ans:'B',exp:'Skills Build Platform is a digital platform developed by IBM.'},
{n:175,cat:'history',tag:'History',q:'India was the 4th country where Skills Build Platform was launched in:',opts:['A. 2017','B. 2018','C. 2019','D. 2020'],ans:'C',exp:'India is the 4th country where Skills Build Platform was launched in 2019.'},
{n:176,cat:'history',tag:'History',q:'Skills Build was launched in India in alliance with:',opts:['A. NSDC','B. UGC','C. DGT and MSDE','D. Ministry of Education'],ans:'C',exp:'Skills Build launched in India in alliance with DGT, Ministry of Skill Development & Entrepreneurship (MSDE).'},
{n:177,cat:'history',tag:'History',q:'Before India, Skills Build was launched in which countries?',opts:['A. USA, UK, France','B. UK, Germany, France','C. Japan, Germany, France','D. UK, USA, Australia'],ans:'B',exp:'Skills Build was launched in UK, Germany, and France before India.'},
{n:178,cat:'history',tag:'History',q:'Skills Build platform is accessible through:',opts:['A. skillsindia.gov.in','B. bharatskills.gov.in','C. nsdcindia.gov.in','D. msde.gov.in'],ans:'B',exp:'Skills Build is accessible online through bharatskills.gov.in.'},
{n:179,cat:'history',tag:'History',q:'Skills Build offers a 2-year advanced diploma in:',opts:['A. Agriculture and food processing','B. IT, Networking and Cloud computing','C. Construction and civil engineering','D. Healthcare management'],ans:'B',exp:'2-year advanced diploma in Information Technology (IT), Networking and Cloud computing.'},
{n:180,cat:'history',tag:'History',q:'Skills Build platform will also train faculty in:',opts:['A. Machine learning only','B. Basic Artificial Intelligence (AI) Skills','C. Data Science','D. Robotics'],ans:'B',exp:'The platform will train ITI and NSTI faculty in basic Artificial Intelligence (AI) Skills.'},
{n:181,cat:'history',tag:'History',q:'World Youth Skills Day is observed on:',opts:['A. 15 June','B. 15 July','C. 15 August','D. 15 September'],ans:'B',exp:'World Youth Skills Day is observed annually on 15 July.'},
{n:182,cat:'history',tag:'History',q:'PMKVY 1.0 was launched on World Youth Skills Day which falls on:',opts:['A. 15 June 2015','B. 15 July 2015','C. 15 August 2015','D. 1 July 2015'],ans:'B',exp:'PMKVY 1.0 was launched on 15th July, 2015 — World Youth Skills Day.'},
{n:183,cat:'history',tag:'History',q:'The theme for World Youth Skills Day 2025 is:',opts:['A. Skills for the Future','B. Green Skills for Sustainable Development','C. Youth empowerment through AI and digital skills','D. Bridging the Skills Gap'],ans:'C',exp:'Theme for 2025 is "Youth empowerment through AI and digital skills".'},
{n:184,cat:'history',tag:'History',q:'National Entrepreneurship Day is celebrated on:',opts:['A. 9 October','B. 9 November','C. 9 December','D. 19 November'],ans:'B',exp:'National Entrepreneurship Day is on 9th November.'},
{n:185,cat:'history',tag:'History',q:'MSDE was notified on:',opts:['A. 9th October 2014','B. 9th November 2014','C. 9th December 2014','D. 19th November 2014'],ans:'B',exp:'MSDE was notified on 9th Nov, 2014, hence National Entrepreneurship Day is celebrated on this date.'},
{n:186,cat:'history',tag:'History',q:'NIESBUD stands for:',opts:['A. National Institute for Entrepreneurship and Small Business Development','B. National Institute of Entrepreneurship and Skill-Based University Development','C. National Institute for Employment and Small Business Development','D. National Institute for Entrepreneurship and Sector Based Development'],ans:'A',exp:'NIESBUD = National Institute for Entrepreneurship and Small Business Development.'},
{n:187,cat:'history',tag:'History',q:'The Skill Loan Scheme was launched in:',opts:['A. January 2015','B. July 2015','C. January 2016','D. July 2016'],ans:'B',exp:'Skill Loan Scheme was launched in July 2015.'},
{n:188,cat:'history',tag:'History',q:'The Skill Loan Scheme provides credit for courses aligned to:',opts:['A. NCVT standards only','B. National Occupations Standards and NSQF','C. University curriculum','D. ITI syllabus only'],ans:'B',exp:'Provides institutional credit for skill development courses aligned to National Occupations Standards and NSQF.'},
{n:189,cat:'history',tag:'History',q:'Skill Loan Scheme is applicable to:',opts:['A. NSDC only','B. All IBA member banks','C. Only nationalized banks','D. RBI only'],ans:'B',exp:'Applicable to all member banks of the Indian Banks Association (IBA) and other banks advised by RBI.'},
{n:190,cat:'history',tag:'History',q:'The quantum of finance under Skill Loan Scheme is:',opts:['A. ₹1,000 to ₹50,000','B. ₹5,000 to ₹1,50,000','C. ₹10,000 to ₹2,00,000','D. ₹2,000 to ₹1,00,000'],ans:'B',exp:'Quantum of Finance: Rs 5000-1,50,000.'},
{n:191,cat:'history',tag:'History',q:'Skill Loan repayment for loans up to ₹50,000:',opts:['A. Up to 2 years','B. Up to 3 years','C. Up to 5 years','D. Up to 7 years'],ans:'B',exp:'Loans up to 50,000 — Repayment up to 3 years.'},
{n:192,cat:'history',tag:'History',q:'Skill Loan repayment for loans between ₹50,000 to ₹1 lakh:',opts:['A. Up to 3 years','B. Up to 4 years','C. Up to 5 years','D. Up to 7 years'],ans:'C',exp:'Loans between 50,000 to 1 lakh — Repayment up to 5 years.'},
{n:193,cat:'history',tag:'History',q:'Skill Loan repayment for loans above ₹1 lakh:',opts:['A. Up to 5 years','B. Up to 6 years','C. Up to 7 years','D. Up to 10 years'],ans:'C',exp:'Loans above 1 lakh — Repayment up to 7 years.'},
{n:194,cat:'history',tag:'History',q:'Skill Loan Scheme does NOT allow:',opts:['A. Multiple loan installments','B. Collateral to be charged from beneficiary','C. Partial loan disbursement','D. Prepayment of loan'],ans:'B',exp:'The scheme does not allow for a collateral to be charged from the beneficiary.'},
{n:195,cat:'history',tag:'History',q:'IIE focuses on entrepreneurship development in which sector?',opts:['A. Large corporations','B. Small and micro enterprises','C. Government sector','D. Agricultural sector'],ans:'B',exp:'IIE undertakes training, research and consultancy in small and micro enterprises focusing on entrepreneurship.'},
{n:196,cat:'history',tag:'History',q:'Skills Build platform is free to use and accessible to:',opts:['A. Only ITI teachers','B. Only students','C. ITI/NSTI Students and Teachers','D. Only government employees'],ans:'C',exp:'Skills Build is free to use and accessible through bharatskills.gov.in for ITI/NSTI Students and Teachers.'},
{n:197,cat:'history',tag:'History',q:'The 10+2+3 pattern implies that the +2 stage should not be merely:',opts:['A. A vocational stage','B. A college preparatory stage','C. An academic stage','D. A technical stage'],ans:'B',exp:'CABE reiterated that +2 should not be merely college preparatory but preparation for vocations.'},
{n:198,cat:'history',tag:'History',q:'Kothari Commission found that only what % of +2 level pass students go for higher education?',opts:['A. 30%','B. 40%','C. 50%','D. 60%'],ans:'C',exp:'Only 50% of +2 level pass students go for higher education; rest go without productive skills.'},
{n:199,cat:'history',tag:'History',q:'National Policy for Skill Development and Entrepreneurship was released in:',opts:['A. 2014','B. 2015','C. 2016','D. 2017'],ans:'C',exp:'2016 National Policy for Skill Development and Entrepreneurship emphasized integration with academic pathways.'},
{n:200,cat:'history',tag:'History',q:'MHRD now stands renamed as:',opts:['A. MSDE','B. Ministry of Education','C. Ministry of Human Resource','D. Ministry of Learning'],ans:'B',exp:'MHRD (Ministry of Human Resource Development) was renamed as Ministry of Education.'},

// ── SUPW & PRE-VOC (Q201-280) ──
{n:201,cat:'supw',tag:'SUPW',q:'SUPW stands for:',opts:['A. Socially Useful Productive Work','B. Skill Upgradation Programme for Workers','C. State Unified Programme of Work','D. Socially Unified Productive Work'],ans:'A',exp:'SUPW = Socially Useful Productive Work.'},
{n:202,cat:'supw',tag:'SUPW',q:'SUPW is defined as:',opts:['A. Academic work useful to society','B. Purposive, meaningful, manual work resulting in goods or services useful to society','C. Any community service activity','D. Work done in school laboratories'],ans:'B',exp:'SUPW is purposive, meaningful, manual work resulting in goods or services useful to society.'},
{n:203,cat:'supw',tag:'SUPW',q:'The Ishwarbhai Patel Committee was appointed in:',opts:['A. 1973','B. 1975','C. 1977','D. 1980'],ans:'C',exp:'Ishwarbhai Patel Committee was appointed in 1977 to examine the 10-year school system.'},
{n:204,cat:'supw',tag:'SUPW',q:'The Ishwarbhai Patel Committee recommended the term:',opts:['A. Work Experience','B. SUPW','C. Vocational Training','D. Pre-vocational Education'],ans:'B',exp:'Ishwarbhai Patel Committee recommended the term "Socially Useful Productive Work" (SUPW).'},
{n:205,cat:'supw',tag:'SUPW',q:'Earlier, Kothari Commission conceived work experience as:',opts:['A. Only classroom activity','B. Participation in productive work in school, home, workshop, farm, factory','C. Physical education','D. Military training'],ans:'B',exp:'Kothari Commission conceived work experience as participation in productive work in school, home, workshop, farm, factory.'},
{n:206,cat:'supw',tag:'SUPW',q:'Which characteristic of SUPW states the learner understands "Why" and "for what"?',opts:['A. Meaningful work','B. Manual work','C. Purposive work','D. Goods or Services'],ans:'C',exp:'Purposive work: learner understands "Why" and "for what" of the work performed.'},
{n:207,cat:'supw',tag:'SUPW',q:'Which SUPW characteristic relates to needs of learner and community?',opts:['A. Purposive work','B. Meaningful work','C. Manual work','D. Service work'],ans:'B',exp:'Meaningful work: related to the needs of the learner and the community.'},
{n:208,cat:'supw',tag:'SUPW',q:'The main purpose of including manual work in SUPW is to:',opts:['A. Improve physical fitness','B. Instill the dignity of labour','C. Teach technical skills','D. Reduce academic burden'],ans:'B',exp:'Main purpose of manual work in SUPW is to instill the dignity of labour among students.'},
{n:209,cat:'supw',tag:'SUPW',q:'SUPW activities at lower primary stage include:',opts:['A. Repair of domestic appliances','B. Garment making','C. Paper folding and paper crafts','D. Clay models'],ans:'C',exp:'Lower primary SUPW: paper folding, campus cleaning, community visits, growing plants.'},
{n:210,cat:'supw',tag:'SUPW',q:'Making dolls is a SUPW activity at which stage?',opts:['A. Lower primary','B. Upper primary','C. Secondary','D. Higher secondary'],ans:'B',exp:'Making dolls is an upper primary SUPW activity.'},
{n:211,cat:'supw',tag:'SUPW',q:'Garment making is a SUPW activity at which stage?',opts:['A. Lower primary','B. Upper primary','C. Secondary','D. Higher secondary'],ans:'C',exp:'Garment making is a secondary-stage SUPW activity.'},
{n:212,cat:'supw',tag:'SUPW',q:'Clay models is a SUPW activity at which stage?',opts:['A. Lower primary','B. Upper primary','C. Secondary','D. Primary'],ans:'B',exp:'Clay models is an upper primary SUPW activity.'},
{n:213,cat:'supw',tag:'SUPW',q:'Repair of domestic appliances is a SUPW activity at:',opts:['A. Lower primary','B. Upper primary','C. Secondary','D. Primary'],ans:'C',exp:'Repair of domestic appliances is a secondary-stage SUPW activity.'},
{n:214,cat:'supw',tag:'SUPW',q:'Cloth dyeing and printing is a SUPW activity at:',opts:['A. Lower primary','B. Upper primary','C. Secondary','D. Pre-primary'],ans:'C',exp:'Cloth dyeing and printing is a secondary-stage SUPW activity.'},
{n:215,cat:'supw',tag:'SUPW',q:'Growing plants is a SUPW activity at:',opts:['A. Upper primary','B. Secondary','C. Lower primary','D. Higher secondary'],ans:'C',exp:'Growing plants is a lower primary SUPW activity.'},
{n:216,cat:'supw',tag:'SUPW',q:'Beautification of school campus is a SUPW activity at:',opts:['A. Lower primary','B. Upper primary','C. Secondary','D. Higher secondary'],ans:'B',exp:'Beautification of school campus is an upper primary SUPW activity.'},
{n:217,cat:'supw',tag:'SUPW',q:'NCERT criteria for SUPW activities include activities that:',opts:['A. Are expensive to conduct','B. Require specialized equipment','C. Help develop total personality and involve problem solving','D. Are conducted outside school only'],ans:'C',exp:'NCERT criteria: activities should help develop total personality, involve problem solving and creative thinking.'},
{n:218,cat:'supw',tag:'SUPW',q:'SUPW activities should result in products which are:',opts:['A. For export only','B. Directly consumable by students and community','C. For teacher use only','D. Sold in market'],ans:'B',exp:'Activities should result in products directly consumable by students and school community.'},
{n:219,cat:'supw',tag:'SUPW',q:'SUPW results in either goods or:',opts:['A. Academic degrees','B. Services','C. Certificates','D. Employment'],ans:'B',exp:'SUPW either results in goods (material products) or involves students in services.'},
{n:220,cat:'supw',tag:'SUPW',q:'The Importance of SUPW includes developing:',opts:['A. Mathematical ability','B. Tolerance, cooperation and helpfulness','C. Scientific reasoning','D. Political awareness'],ans:'B',exp:'SUPW develops values like tolerance, cooperation, and helpfulness.'},
{n:221,cat:'supw',tag:'SUPW',q:'SUPW motivates students to:',opts:['A. Only study academics','B. Earn while they learn','C. Focus on competitive exams','D. Avoid manual work'],ans:'B',exp:'SUPW motivates active participation and enables students to earn while they learn.'},
{n:222,cat:'supw',tag:'SUPW',q:'Pre-vocational education is a:',opts:['A. Full vocational training program','B. Preparatory phase before formal VE','C. University-level course','D. Certificate program'],ans:'B',exp:'Pre-vocational education is a preparatory phase, not full-fledged vocational training.'},
{n:223,cat:'supw',tag:'SUPW',q:'One objective of pre-vocational education is to remove social bias against:',opts:['A. Women education','B. Manual and technical work','C. English medium schools','D. Rural education'],ans:'B',exp:'Cultivation of Dignity of Labour: remove social bias against manual and technical work.'},
{n:224,cat:'supw',tag:'SUPW',q:'Pre-vocational education focuses on development of which type of skills?',opts:['A. Only academic skills','B. Only communication skills','C. Cognitive, psychomotor, and affective growth','D. Research skills'],ans:'C',exp:'Pre-vocational education fosters cognitive, psychomotor, and affective growth (holistic development).'},
{n:225,cat:'supw',tag:'SUPW',q:'As per Revised NPE (1992), SUPW is treated as part of:',opts:['A. Academic education','B. Pre-vocational education','C. Post-vocational education','D. Higher education'],ans:'B',exp:'Revised NPE (1992): SUPW and work-experience activities treated as part of pre-vocational education.'},
{n:226,cat:'supw',tag:'SUPW',q:'SUPW is helpful in applying classroom learning to solve:',opts:['A. Examination problems','B. Day-to-day problems of community','C. Industrial problems only','D. Research problems'],ans:'B',exp:'SUPW helps in applying classroom learning and knowledge to solve day-to-day problems of community.'},
{n:227,cat:'supw',tag:'SUPW',q:'SUPW develops a belief in:',opts:['A. Academic superiority','B. Dignity of labour and self-reliance','C. Competitive spirit','D. Social hierarchy'],ans:'B',exp:'SUPW develops belief in dignity of labour and self-reliance.'},
{n:228,cat:'supw',tag:'SUPW',q:'Stitching and knitting work is a SUPW activity at:',opts:['A. Lower primary','B. Upper primary','C. Secondary','D. All stages'],ans:'B',exp:'Stitching and knitting work is an upper primary SUPW activity.'},
{n:229,cat:'supw',tag:'SUPW',q:'Visiting community service centres like post office is a SUPW activity for:',opts:['A. Upper primary','B. Secondary','C. Lower primary','D. Higher secondary'],ans:'C',exp:'Visit to community service centers (bus stop, post office etc.) is a lower primary SUPW activity.'},
{n:230,cat:'supw',tag:'SUPW',q:'Preparation of squash, jam, pickles is a SUPW activity for:',opts:['A. Lower primary','B. Upper primary','C. Secondary','D. Pre-primary'],ans:'C',exp:'Preparation of squash, jam, pickles, candles etc. is a secondary-stage SUPW activity.'},
{n:231,cat:'supw',tag:'SUPW',q:'An objective of pre-vocational education related to entrepreneurship is:',opts:['A. Research training','B. Enhancing employability and self-reliance','C. Corporate training','D. University preparation'],ans:'B',exp:'Enhancing Employability & Self-reliance: instill basic entrepreneurial skills and problem-solving abilities.'},
{n:232,cat:'supw',tag:'SUPW',q:'SUPW inculcates positive attitudes of:',opts:['A. Competition','B. Individual achievement','C. Team work','D. Academic excellence'],ans:'C',exp:'SUPW inculcates positive attitudes of team work.'},
{n:233,cat:'supw',tag:'SUPW',q:'Pre-vocational education cultivates:',opts:['A. Dignity of Capital','B. Dignity of Labour','C. Dignity of Scholarship','D. Dignity of Government Service'],ans:'B',exp:'One key objective is Cultivation of Dignity of Labour.'},
{n:234,cat:'supw',tag:'SUPW',q:'To be socially useful, SUPW work should be:',opts:['A. Expensive','B. Relevant to community and individual child needs','C. Technology-dependent','D. Conducted by experts only'],ans:'B',exp:'To be socially useful, work should be relevant to meet the needs of community and individual child.'},
{n:235,cat:'supw',tag:'SUPW',q:'SUPW develops sense of respect to:',opts:['A. Academic scholars','B. Manual workers','C. Government officials','D. Religious leaders'],ans:'B',exp:'SUPW develops a sense of respect to manual workers.'},
{n:236,cat:'supw',tag:'SUPW',q:'School and campus cleaning is a SUPW activity for:',opts:['A. Lower primary','B. Upper primary','C. Secondary','D. All stages'],ans:'A',exp:'School and campus cleaning is a lower primary SUPW activity.'},
{n:237,cat:'supw',tag:'SUPW',q:'Pre-vocational education as per CBSE is for which classes?',opts:['A. 1 to 5','B. 6, 7, 8','C. 9 and 10','D. 11 and 12'],ans:'B',exp:'CBSE pre-vocational education is offered to Class 6th, 7th, 8th students.'},
{n:238,cat:'supw',tag:'SUPW',q:'Kothari Commission recommended work experience should be an essential component at:',opts:['A. Only secondary level','B. All stages of education','C. Only higher education','D. Only primary level'],ans:'B',exp:'Work experience should be an essential component at all stages of education.'},
{n:239,cat:'supw',tag:'SUPW',q:'SUPW acquaints children with:',opts:['A. Political systems','B. Work and services prevailing in community','C. Foreign languages','D. Military discipline'],ans:'B',exp:'SUPW acquaints children with work and services prevailing in the community.'},
{n:240,cat:'supw',tag:'SUPW',q:'SUPW helps students to participate in:',opts:['A. Political activities','B. Nation building activities','C. Business activities','D. Research activities'],ans:'B',exp:'SUPW helps students participate in Nation building activities.'},

// ── PROBLEMS (Q241-270) ──
{n:241,cat:'problems',tag:'Problems',q:'One major problem in VE is shortage of:',opts:['A. Students','B. VET institutions','C. Government schemes','D. Foreign investment'],ans:'B',exp:'Shortage of VET Institutions is a major problem — insufficient well-equipped institutions post-Independence.'},
{n:242,cat:'problems',tag:'Problems',q:'Limited/restricted curriculum in VE means:',opts:['A. Too many subjects are taught','B. Only technical subjects, no liberal education','C. Curriculum changes too frequently','D. Too few exams'],ans:'B',exp:'In VET institutions, only technical subjects are provided with no provision of liberal education.'},
{n:243,cat:'problems',tag:'Problems',q:'The medium of instruction problem in VE is because:',opts:['A. Hindi medium students struggle with English-medium technical institutions','B. Too many languages are used','C. Regional languages are not allowed','D. English is not taught'],ans:'A',exp:'English is the common medium in technical institutions; Hindi/regional medium students find it difficult.'},
{n:244,cat:'problems',tag:'Problems',q:'Lack of quality teachers in VE leads to a problem of:',opts:['A. High fees','B. Staff retention','C. Too many students','D. Curriculum changes'],ans:'B',exp:'Lack of quality teachers and problem of staff retention is a significant issue in VE.'},
{n:245,cat:'problems',tag:'Problems',q:'Insufficient practical exposure in VE means:',opts:['A. Students get too much lab time','B. Mere theoretical knowledge is not enough for workshops/industries','C. No exams are conducted','D. Students do not attend classes'],ans:'B',exp:'Mere theoretical knowledge will not suffice for candidates to establish small workshops or industries.'},

let answered = {};
let correct = 0;
let wrong = 0;

function renderQuestions(list) {
  const c = document.getElementById('mcqContainer');
  c.innerHTML = '';
  list.forEach(q => {
    const div = document.createElement('div');
    div.className = 'mcq-card fade-in';
    div.id = 'q' + q.n;
    div.setAttribute('data-cat', q.cat);
    
    const state = answered[q.n];
    if(state === 'correct') div.classList.add('answered-correct');
    else if(state === 'wrong') div.classList.add('answered-wrong');
    
    div.innerHTML = `
      <div class="q-header">
        <span class="q-num">Q${q.n}</span>
        <span class="q-tag">${q.tag}</span>
        <div class="q-text">${q.q}</div>
      </div>
      <div class="options" id="opts${q.n}">
        ${q.opts.map((o,i) => {
          let cls = 'option';
          const letter = o[0];
          if(state) {
            cls += ' disabled';
            if(letter === q.ans) cls += ' correct';
            else if(state === letter) cls += ' wrong';
          }
          return `<button class="${cls}" onclick="selectAnswer(${q.n}, '${letter}', this)">`+
            `<span class="opt-label">${letter}</span>${o.substring(3)}</button>`;
        }).join('')}
      </div>
      <div class="explanation ${state ? 'show' : ''}" id="exp${q.n}">
        <strong>Explanation:</strong> ${q.exp}
      </div>`;
    c.appendChild(div);
  });
  updateStats();
}

function selectAnswer(n, selected, btn) {
  if(answered[n]) return;
  const q = questions.find(x => x.n === n);
  answered[n] = selected;
  
  const opts = document.querySelectorAll(`#opts${n} .option`);
  opts.forEach(o => {
    o.classList.add('disabled');
    if(o.querySelector('.opt-label').textContent === q.ans) o.classList.add('correct');
    else if(o === btn && selected !== q.ans) o.classList.add('wrong');
  });
  
  const card = document.getElementById('q'+n);
  if(selected === q.ans) { correct++; card.classList.add('answered-correct'); }
  else { wrong++; card.classList.add('answered-wrong'); }
  
  document.getElementById('exp'+n).classList.add('show');
  updateStats();
}

function updateStats() {
  const total = questions.length;
  const done = Object.keys(answered).length;
  document.getElementById('correctCount').textContent = correct;
  document.getElementById('wrongCount').textContent = wrong;
  document.getElementById('remainCount').textContent = total - done;
  const pct = done > 0 ? Math.round((correct/done)*100) : 0;
  document.getElementById('scoreDisplay').textContent = `Score: ${pct}%`;
  document.getElementById('progressFill').style.width = ((done/total)*100)+'%';
}

function revealAll() {
  questions.forEach(q => {
    if(!answered[q.n]) {
      answered[q.n] = q.ans;
      const opts = document.querySelectorAll(`#opts${q.n} .option`);
      opts.forEach(o => {
        o.classList.add('disabled');
        if(o.querySelector('.opt-label').textContent === q.ans) o.classList.add('correct');
      });
      document.getElementById('exp'+q.n).classList.add('show');
    }
  });
  updateStats();
}

function resetAll() {
  answered = {}; correct = 0; wrong = 0;
  renderQuestions(questions);
  updateStats();
}

function showResults() {
  const panel = document.getElementById('resultPanel');
  const done = Object.keys(answered).length;
  panel.classList.toggle('show');
  document.getElementById('resultScore').textContent = correct + '/' + done;
  const pct = done > 0 ? Math.round((correct/done)*100) : 0;
  let grade = pct >= 90 ? '🏆 Excellent!' : pct >= 75 ? '⭐ Very Good!' : pct >= 60 ? '👍 Good' : pct >= 45 ? '📚 Average' : '💪 Keep Practicing';
  document.getElementById('resultSub').textContent = `${pct}% Score — ${grade} (${done} of ${questions.length} attempted)`;
}

function filterChapter(cat, btn) {
  document.querySelectorAll('.ch-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('searchBox').value = '';
  if(cat === 'all') renderQuestions(questions);
  else renderQuestions(questions.filter(q => q.cat === cat));
}

function searchQuestions() {
  const val = document.getElementById('searchBox').value.toLowerCase();
  if(!val) { renderQuestions(questions); return; }
  renderQuestions(questions.filter(q => q.q.toLowerCase().includes(val) || q.opts.some(o => o.toLowerCase().includes(val))));
}

renderQuestions(questions);
</script>
</body>
