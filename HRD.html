<style>
  :root {

    position: relative;

  }
  header::before {
    content: '';
    position: absolute;
    width: 380px; height: 380px;
    background: radial-gradient(circle, #f5c84222 0%, transparent 65%);
    top: -120px; right: -80px;
    border-radius: 50%;
  }
  header::after {
    content: '';
    position: absolute;
    width: 200px; height: 200px;
    background: radial-gradient(circle, #4ecdc422 0%, transparent 65%);
    bottom: -60px; left: 40px;
    border-radius: 50%;
  }
  .header-badge {
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--accent1);
    text-transform: uppercase;
    margin-bottom: 10px;
    font-weight: 800;
  }
  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(28px, 5vw, 52px);
    letter-spacing: 2px;
    color: #fff;
    line-height: 1.1;
    position: relative;
    z-index: 1;
  }
  header h1 span { color: var(--accent1); }
  .header-sub {
    margin-top: 10px;
    color: var(--muted);
    font-size: 14px;
    font-weight: 600;
    position: relative;
    z-index: 1;
  }

  /* ── TOPIC TABS ── */
  .tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 24px;
  }
  .tab {
    background: var(--card-bg);
    border: 1.5px solid #2e2e42;
    border-radius: 50px;
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 800;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'Nunito', sans-serif;
  }
  .tab:hover { border-color: var(--accent1); color: var(--accent1); }
  .tab.active {
    background: var(--accent1);
    border-color: var(--accent1);
    color: #000;
    box-shadow: 0 0 18px #f5c84266;
  }

  /* ── TOPIC PANEL ── */
  .panel {
    display: none;
    animation: fadeIn 0.3s ease;
  }
  .panel.active { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .panel-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 20px;
    padding: 18px 22px;
    border-radius: 14px;
    position: relative;
    overflow: hidden;
  }

    content: '';
    position: absolute; inset: 0;
    background: inherit;
    opacity: 0.12;

    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 1.5px;
    position: relative;
    z-index: 1;
  }

    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 14px;
  }

  .card {
    background: var(--card-bg);
    border-radius: 12px;
    border: 1.5px solid #2e2e42;
    overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.2s;

  .card:hover { border-color: #4e4e6e; box-shadow: 0 4px 24px #00000066; }

  .card-head {
    padding: 13px 18px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    user-select: none;
  }
  .card-head-title {
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .card-toggle {
    font-size: 20px;
    font-weight: 900;
    line-height: 1;
    transition: transform 0.25s;
  }
  .card.open .card-toggle { transform: rotate(45deg); }

  .card-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s ease;
  }
  .card.open .card-body { max-height: 2000px; }

  .card-body ul {
    list-style: none;
    padding: 6px 18px 16px 18px;
  }
  .card-body li {
    font-size: 13px;
    font-weight: 600;
    color: #c5c5dd;
    line-height: 1.7;
    padding: 5px 0 5px 20px;
    border-bottom: 1px solid #1e1e2e;
    position: relative;
  }
  .card-body li:last-child { border-bottom: none; }
  .card-body li::before {
    content: '▸';
    position: absolute;
    left: 0;
    opacity: 0.5;
  }
  .card-body li strong {
    color: var(--accent1);
    font-weight: 800;
  }

  /* ── QUICK RECALL ── */
  .recall-section {
    margin-top: 32px;
    background: var(--card-bg);
    border: 1.5px solid #f5c84233;
    border-radius: 16px;
    padding: 24px;
  }
  .recall-section h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--accent1);

  }

  }
  .recall-card {

    padding: 12px 14px;

  }

  .recall-label { font-size: 11px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; }
  .recall-val { font-size: 15px; font-weight: 900; color: var(--accent1); }

  /* ── FOOTER ── */
  footer {
    text-align: center;
    padding: 28px;
    color: var(--muted);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    border-top: 1px solid #2e2e42;
  }

  /* ── SCROLLBAR ── */

  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: #3e3e5e; border-radius: 3px; }
</style>

  // tab
  const tab = document.createElement('button');
  tab.className = 'tab' + (i === 0 ? ' active' : '');
  tab.dataset.id = t.id;
  tab.innerHTML = `${t.icon} ${t.title}`;
  tabsEl.appendChild(tab);

  // panel
  const panel = document.createElement('div');
  panel.className = 'panel' + (i === 0 ? ' active' : '');
  panel.id = 'panel-' + t.id;

  let subHTML = '';
  t.subtopics.forEach((s, si) => {
    subHTML += `
      <div class="card" id="card-${t.id}-${si}">
        <div class="card-head" onclick="toggleCard('${t.id}-${si}')">
          <span class="card-head-title" style="color:${t.color}">${s.title}</span>
          <span class="card-toggle" style="color:${t.color}">+</span>
        </div>
        <div class="card-body">
          <ul>${s.points.map(p => `<li>${p}</li>`).join('')}</ul>
        </div>
      </div>`;
  });

  panel.innerHTML = `
    <div class="panel-header" style="background:${t.color}22; border:1.5px solid ${t.color}44">
      <span class="panel-icon">${t.icon}</span>
      <span class="panel-title" style="color:${t.color}">${t.title}</span>
    </div>
    <div class="subtopics">${subHTML}</div>`;
  panelsEl.appendChild(panel);
});

// Build recall grid
const recallEl = document.getElementById('recall');
recallFacts.forEach(f => {
  recallEl.innerHTML += `
    <div class="recall-card">
      <div class="recall-label">${f.label}</div>
      <div class="recall-val">${f.val}</div>
    </div>`;
});

// Tab click
tabsEl.addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  tab.classList.add('active');
  document.getElementById('panel-' + tab.dataset.id).classList.add('active');
});

// Toggle card
function toggleCard(id) {
  const card = document.getElementById('card-' + id);
  card.classList.toggle('open');
}
</script>
</body>
</html>
