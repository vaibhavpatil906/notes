<!DOCTYPE html>
<html lang="en">
<head>

<title>Vocational Education — 500 MCQs Set 2 | Ignite Academy</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Sans+3:wght@300;400;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0f14;--s1:#151820;--s2:#1c2030;--s3:#232840;--red:#e05252;--dred:#c0392b;--gold:#f0b429;--border:#2a2f45;--borderb:#3a4060;--text:#d0d8f0;--textd:#7a85a8;--textb:#eef2ff;--green:#3dba7a;--greenbg:#0a1f15;--blue:#4a9eda;--bluebg:#0a1525;--purple:#a07ee0;--purplebg:#150e28;}
*{box-sizing:border-box;margin:0;padding:0;}html{scroll-behavior:smooth;}
body{font-family:'Source Sans 3',sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.7;}
::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--borderb);border-radius:3px;}
header{background:linear-gradient(135deg,#0a0c12,#131828,#1a1030);padding:36px 40px 28px;border-bottom:1px solid var(--borderb);position:relative;overflow:hidden;}
header::before{content:'';position:absolute;top:-60px;right:-60px;width:260px;height:260px;border-radius:50%;background:radial-gradient(circle,rgba(74,158,218,0.15) 0%,transparent 70%);}
header h1{font-family:'Playfair Display',serif;font-size:2.2rem;color:var(--textb);position:relative;z-index:1;text-shadow:0 0 30px rgba(74,158,218,0.25);}
header .sub{font-size:0.8rem;color:var(--textd);letter-spacing:3px;text-transform:uppercase;margin-top:6px;position:relative;z-index:1;}
header .badges{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;position:relative;z-index:1;}
.badge{padding:4px 14px;border-radius:20px;font-size:0.72rem;font-weight:700;letter-spacing:1px;border:1px solid;}
.badge.red{background:linear-gradient(135deg,var(--dred),#6b1010);color:white;border-color:rgba(224,82,82,0.3);}
.badge.gold{background:linear-gradient(135deg,#7a5a00,#4a3600);color:var(--gold);border-color:rgba(240,180,41,0.3);}
.badge.blue{background:linear-gradient(135deg,#0a3060,#061825);color:var(--blue);border-color:rgba(74,158,218,0.3);}
.stats-bar{background:var(--s1);border-bottom:1px solid var(--border);padding:14px 40px;display:flex;gap:32px;align-items:center;flex-wrap:wrap;position:sticky;top:0;z-index:100;}
.stat{display:flex;align-items:center;gap:8px;font-size:0.82rem;color:var(--textd);}
.stat strong{color:var(--textb);font-family:'Fira Code',monospace;font-size:0.9rem;}
.stat .dot{width:8px;height:8px;border-radius:50%;}
.score-display{margin-left:auto;font-family:'Fira Code',monospace;font-size:1rem;color:var(--gold);font-weight:700;}
.progress-bar{height:3px;background:var(--border);}.progress-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--gold),var(--green));transition:width 0.3s;width:0%;}
.container{max-width:900px;margin:0 auto;padding:28px 24px 60px;}
.controls{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap;}
.btn{padding:8px 18px;border-radius:8px;border:1px solid var(--borderb);background:var(--s2);color:var(--text);font-size:0.82rem;cursor:pointer;transition:all 0.2s;font-family:'Source Sans 3',sans-serif;font-weight:600;}
.btn:hover{background:var(--s3);color:var(--textb);border-color:var(--gold);}
.btn.primary{background:linear-gradient(135deg,var(--dred),#6b1010);color:white;border-color:rgba(224,82,82,0.4);}
.btn.primary:hover{box-shadow:0 0 16px rgba(224,82,82,0.3);}
.btn.success{background:linear-gradient(135deg,#1a6040,#0a3020);color:var(--green);border-color:rgba(61,186,122,0.3);}
.chapter-nav{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;}
.ch-btn{padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:var(--s1);color:var(--textd);font-size:0.75rem;cursor:pointer;transition:all 0.2s;font-family:'Fira Code',monospace;}
.ch-btn:hover,.ch-btn.active{background:var(--purplebg);color:var(--purple);border-color:rgba(160,126,224,0.4);}
.search-box{width:100%;padding:10px 16px;border-radius:8px;border:1px solid var(--borderb);background:var(--s2);color:var(--textb);font-size:0.88rem;margin-bottom:20px;font-family:'Source Sans 3',sans-serif;}
.search-box:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 2px rgba(74,158,218,0.1);}
.search-box::placeholder{color:var(--textd);}
.mcq-card{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:22px 26px;margin-bottom:14px;transition:border-color 0.2s;position:relative;}
.mcq-card:hover{border-color:var(--borderb);}
.mcq-card.answered-correct{border-color:rgba(61,186,122,0.4);background:linear-gradient(135deg,var(--s1),rgba(61,186,122,0.04));}
.mcq-card.answered-wrong{border-color:rgba(224,82,82,0.3);background:linear-gradient(135deg,var(--s1),rgba(224,82,82,0.04));}
.q-header{display:flex;align-items:flex-start;gap:14px;margin-bottom:16px;}
.q-num{font-family:'Fira Code',monospace;font-size:0.72rem;color:var(--textd);background:var(--s3);padding:3px 9px;border-radius:6px;border:1px solid var(--border);flex-shrink:0;margin-top:2px;}
.q-tag{font-family:'Fira Code',monospace;font-size:0.68rem;background:var(--purplebg);color:var(--purple);padding:2px 8px;border-radius:8px;border:1px solid rgba(160,126,224,0.3);flex-shrink:0;margin-top:2px;}
.q-text{font-size:0.93rem;color:var(--textb);font-weight:600;line-height:1.55;}
.options{display:grid;gap:8px;}
.option{padding:10px 14px;border-radius:8px;border:1px solid var(--border);background:var(--s2);color:var(--text);font-size:0.87rem;cursor:pointer;transition:all 0.2s;display:flex;align-items:flex-start;gap:10px;text-align:left;}
.option:hover:not(.disabled){border-color:var(--blue);color:var(--textb);background:rgba(74,158,218,0.07);}
.option .opt-label{font-family:'Fira Code',monospace;font-size:0.72rem;color:var(--textd);background:var(--s3);padding:1px 6px;border-radius:4px;flex-shrink:0;margin-top:1px;}
.option.correct{border-color:var(--green);background:rgba(61,186,122,0.1);color:var(--green);}
.option.correct .opt-label{background:rgba(61,186,122,0.2);color:var(--green);}
.option.wrong{border-color:var(--red);background:rgba(224,82,82,0.1);color:var(--red);}
.option.wrong .opt-label{background:rgba(224,82,82,0.2);color:var(--red);}
.option.disabled{cursor:default;}
.explanation{margin-top:12px;padding:12px 16px;background:var(--greenbg);border:1px solid rgba(61,186,122,0.2);border-radius:8px;font-size:0.83rem;color:var(--text);display:none;}
.explanation.show{display:block;}
.explanation strong{color:var(--green);}
.result-panel{background:var(--s1);border:1px solid var(--borderb);border-radius:14px;padding:28px;margin:24px 0;text-align:center;display:none;}
.result-panel.show{display:block;}
.result-score{font-family:'Playfair Display',serif;font-size:3rem;color:var(--gold);margin-bottom:8px;}
.result-sub{color:var(--textd);font-size:0.9rem;}
.set-link{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:8px;background:linear-gradient(135deg,#0a3060,#061825);color:var(--blue);border:1px solid rgba(74,158,218,0.3);text-decoration:none;font-size:0.85rem;font-weight:600;margin-bottom:24px;transition:all 0.2s;}
.set-link:hover{box-shadow:0 0 16px rgba(74,158,218,0.2);border-color:var(--blue);}
.fade-in{animation:fadeIn 0.3s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>

<script>
const questions = [
// ── ADVANCED DEFINITION (501-540) ──
{n:501,cat:'definition',tag:'Definition',q:'VE is considered effective when it results in:',opts:['A. Maximum enrollment','B. Employment or self-employment of trainees','C. Highest examination scores','D. Most certificates issued'],ans:'B',exp:'Effectiveness of VE is measured by employment or self-employment of trainees.'},
{n:502,cat:'definition',tag:'Definition',q:'Which statement CORRECTLY describes TVET?',opts:['A. Only theory-based education','B. Prepares for academic degrees only','C. Encompasses both technical and vocational aspects of education and training','D. Only for school dropouts'],ans:'C',exp:'TVET = Technical and Vocational Education and Training — encompasses both aspects.'},
{n:503,cat:'definition',tag:'Definition',q:'VE differs from general education primarily in its focus on:',opts:['A. Academic achievement','B. Practical and occupational skills','C. Research capabilities','D. Language proficiency'],ans:'B',exp:'VE differs from general education by focusing on practical and occupational skill development.'},
{n:504,cat:'definition',tag:'Definition',q:'The concept of "Career and Technical Education" emphasizes:',opts:['A. Theoretical knowledge only','B. Career readiness and technical skills','C. Academic research','D. Social sciences'],ans:'B',exp:'CTE emphasizes career readiness and technical skills.'},
{n:505,cat:'definition',tag:'Definition',q:'India\'s skill gap problem is best addressed through:',opts:['A. More university degrees','B. Vocational and technical training','C. International education','D. Online degrees only'],ans:'B',exp:'India\'s huge skill gap between industry demands and workforce skills is best addressed through VE.'},
{n:506,cat:'definition',tag:'Definition',q:'Self-employment through VE helps reduce:',opts:['A. Academic excellence','B. Poverty and unemployment','C. Industrial growth','D. Government spending on education'],ans:'B',exp:'VE enhances self-employment, reducing poverty and unemployment.'},
{n:507,cat:'definition',tag:'Definition',q:'VE in India is critical because it prepares youth for:',opts:['A. Only government jobs','B. A wide range of occupations in the economy','C. Only manufacturing jobs','D. Only IT sector'],ans:'B',exp:'VE prepares youth for a wide range of occupations across all sectors of the economy.'},
{n:508,cat:'definition',tag:'Definition',q:'The primary beneficiaries of Vocational Education are:',opts:['A. Research scholars','B. School/college dropouts and working adults','C. University professors','D. Government officers'],ans:'B',exp:'Primary beneficiaries include school/college dropouts and working adults seeking skill development.'},
{n:509,cat:'definition',tag:'Definition',q:'Which global body promotes TVET as a key strategy for sustainable development?',opts:['A. WHO','B. UNESCO','C. WTO','D. IMF'],ans:'B',exp:'UNESCO promotes TVET as a key strategy for sustainable development and workforce empowerment.'},
{n:510,cat:'definition',tag:'Definition',q:'VE contributes to industrial productivity by ensuring:',opts:['A. More factory construction','B. Trained and skilled workforce aligned with industry needs','C. Lower wages','D. Automated machinery'],ans:'B',exp:'VE increases industry productivity by aligning training with industry needs.'},
{n:511,cat:'definition',tag:'Definition',q:'Which education model integrates VE with academic education?',opts:['A. Pure academic model','B. Dual system or integrated model','C. Distance learning model','D. Research model'],ans:'B',exp:'Dual or integrated models combine VE with academic education for holistic development.'},
{n:512,cat:'definition',tag:'Definition',q:'The "earn while you learn" concept is most associated with:',opts:['A. University internships','B. Apprenticeship training in VE','C. Government scholarships','D. Distance education'],ans:'B',exp:'Apprenticeship training in VE embodies the "earn while you learn" concept.'},
{n:513,cat:'definition',tag:'Definition',q:'VE provides a pathway for students who may not pursue:',opts:['A. Technical education','B. Higher academic education','C. Vocational training','D. Primary education'],ans:'B',exp:'VE provides an alternative pathway for students who may not pursue higher academic education.'},
{n:514,cat:'definition',tag:'Definition',q:'The purpose of NSQF is to:',opts:['A. Eliminate all vocational courses','B. Organize qualifications in a systematic framework by levels','C. Replace NTC','D. Provide only government certifications'],ans:'B',exp:'NSQF organizes qualifications according to a series of levels of knowledge, skills and aptitude.'},
{n:515,cat:'definition',tag:'Definition',q:'CTE in the context of school education means:',opts:['A. Classical Teaching Education','B. Career and Technical Education at school level','C. Central Technical Examination','D. Certified Teaching Examination'],ans:'B',exp:'CTE = Career and Technical Education, also used at the school level.'},
{n:516,cat:'definition',tag:'Definition',q:'Apprenticeship training as a VET system is characterized by:',opts:['A. Only classroom learning','B. Learning on the job under a skilled worker or employer','C. Only examination-based learning','D. Online learning only'],ans:'B',exp:'Apprenticeship training involves learning on the job under a skilled worker or employer.'},
{n:517,cat:'definition',tag:'Definition',q:'Which characteristic of VE makes it particularly relevant for industries?',opts:['A. Focus on research','B. Alignment of training with industry needs','C. Award of academic degrees','D. International certification only'],ans:'B',exp:'VE is aligned with industry needs, which increases industry productivity and relevance.'},
{n:518,cat:'definition',tag:'Definition',q:'Vocational competency refers to:',opts:['A. Academic grades','B. Ability to perform occupational tasks to required standards','C. Number of certifications','D. Years of study'],ans:'B',exp:'Vocational competency refers to the ability to perform occupational tasks to required standards.'},
{n:519,cat:'definition',tag:'Definition',q:'Which level of NSQF is typically for entry-level skilled workers from ITIs?',opts:['A. Level 1-2','B. Level 3-4','C. Level 7-8','D. Level 9-10'],ans:'B',exp:'NSQF levels 3-4 typically correspond to skills acquired through ITI training.'},
{n:520,cat:'definition',tag:'Definition',q:'The concept of "lifelong learning" in VE promotes:',opts:['A. One-time training only','B. Continuous skill upgradation throughout career','C. Only formal education','D. Only academic degrees'],ans:'B',exp:'Lifelong learning in VE promotes continuous skill upgradation throughout one\'s career.'},

// ── ADVANCED ITI (521-580) ──
{n:521,cat:'iti',tag:'ITI',q:'The first ITI in India was established in:',opts:['A. 1947','B. 1950','C. 1952','D. 1960'],ans:'B',exp:'The first ITIs were established around 1950 when CTS (Craftsmen Training Scheme) started.'},
{n:522,cat:'iti',tag:'ITI',q:'NTC is issued by:',opts:['A. State Governments only','B. NCVT','C. DGT directly','D. ITI principals'],ans:'B',exp:'National Trade Certificate (NTC) is issued by NCVT upon passing AITT.'},
{n:523,cat:'iti',tag:'ITI',q:'The IMC Society structure ensures that Industry Partners have how many of the nominated seats?',opts:['A. Majority of seats','B. Equal to State Govt seats','C. 4 out of 10 total','D. None — they are observers only'],ans:'C',exp:'IP nominates 4 members; State nominates 5; Principal is ex-officio = IP has 4 out of 10.'},
{n:524,cat:'iti',tag:'ITI',q:'The interest-free loan for IMC is released after which condition is fulfilled?',opts:['A. MoA signing only','B. Approval of IDP by State Steering Committee','C. Industry Partner payment','D. Faculty appointment'],ans:'B',exp:'Central Govt releases interest-free loan of Rs.2.5 crore after approval of IDPs by SSC.'},
{n:525,cat:'iti',tag:'ITI',q:'Which body frames norms for ITI trade courses?',opts:['A. State Govts only','B. DGT','C. AICTE','D. UGC'],ans:'B',exp:'DGT frames overall norms, policies and standards for vocational training programmes.'},
{n:526,cat:'iti',tag:'ITI',q:'The ITI admission process after State Board of Technical Education may also involve:',opts:['A. Direct interview only','B. Merit-based counselling process','C. Lottery system','D. Donation-based admission'],ans:'B',exp:'Admission is merit-based through counselling processes.'},
{n:527,cat:'iti',tag:'ITI',q:'NCVT recognition is important for ITIs because it:',opts:['A. Provides government funding only','B. Ensures national recognition of certificates and NTC','C. Allows foreign travel','D. Reduces course fees'],ans:'B',exp:'NCVT recognition ensures that ITI certificates and NTCs are nationally recognized.'},
{n:528,cat:'iti',tag:'ITI',q:'Polytechnic institutes offer training leading to:',opts:['A. NTC certificate','B. Diploma in engineering and technology','C. Bachelor\'s degree','D. AITT certificate'],ans:'B',exp:'Polytechnic institutes offer diploma-level training in engineering and technology.'},
{n:529,cat:'iti',tag:'ITI',q:'Which statement about CTS and CITS is CORRECT?',opts:['A. Both started in same year','B. CITS started 2 years before CTS','C. CTS started 2 years before CITS','D. Both are same program'],ans:'B',exp:'CITS started in 1948; CTS started in 1950 — CITS is 2 years older.'},
{n:530,cat:'iti',tag:'ITI',q:'IDP prepared by IMC is submitted to:',opts:['A. Central Government directly','B. State Steering Committee for approval','C. NCVT','D. Industry Partner'],ans:'B',exp:'IDP is submitted to State Steering Committee (SSC) for approval before central funds release.'},
{n:531,cat:'iti',tag:'ITI',q:'The 20% admission quota for IMC is over and above:',opts:['A. Regular state merit admissions','B. No additional seats; it is part of total','C. Paid quota seats','D. Management quota'],ans:'A',exp:'IMC determines 20% of the admissions independently, in addition to the normal state admission process.'},
{n:532,cat:'iti',tag:'ITI',q:'Maharashtra had how many ITI seats approximately?',opts:['A. 75,000','B. 1,00,000','C. 1,50,000','D. 2,00,000'],ans:'C',exp:'Maharashtra had approximately 1.5 lakh ITI seats.'},
{n:533,cat:'iti',tag:'ITI',q:'ITOT (NSTIs) trains which category of professionals?',opts:['A. Trade workers','B. Instructors/trainers for ITIs','C. Factory managers','D. University professors'],ans:'B',exp:'NSTIs (also called ITOT) train instructors/trainers for vocational training institutions.'},
{n:534,cat:'iti',tag:'ITI',q:'The Apprenticeship Act which DGT operates was enacted in:',opts:['A. 1947','B. 1950','C. 1961','D. 1970'],ans:'C',exp:'DGT operates the Apprenticeship Act, 1961.'},
{n:535,cat:'iti',tag:'ITI',q:'QCI handled ITI accreditation for how many years?',opts:['A. 3 years','B. 4 years','C. 5 years','D. 6 years'],ans:'C',exp:'QCI handled ITI accreditation from 2012 to July 2017 — approximately 5 years.'},
{n:536,cat:'iti',tag:'ITI',q:'MoA in ITI upgradation is signed by:',opts:['A. Industry Partner and State only','B. IP, State and Central Govt','C. Industry Partner only','D. Central Govt only'],ans:'B',exp:'MoA is signed amongst Industry Partner (IP), State Government and Central Government.'},
{n:537,cat:'iti',tag:'ITI',q:'The loan repayment for IMC begins from which year?',opts:['A. 1st year','B. 5th year','C. 10th year','D. 11th year'],ans:'D',exp:'IMC repays the loan from the 11th year to the 30th year (over 20 years).'},
{n:538,cat:'iti',tag:'ITI',q:'Which of the following is NOT an objective of CITS?',opts:['A. Train trade workers in specific skills','B. Train instructors for vocational institutions','C. Upgrade teaching faculty skills','D. Produce craft instructors'],ans:'A',exp:'Training trade workers is the objective of CTS, not CITS. CITS trains instructors.'},
{n:539,cat:'iti',tag:'ITI',q:'The duration of CITS programs is typically:',opts:['A. 6 months','B. 1 year','C. 2 years','D. 3 years'],ans:'B',exp:'CITS programs are typically 1 year in duration.'},
{n:540,cat:'iti',tag:'ITI',q:'DGT under MSDE also oversees:',opts:['A. University engineering programs','B. Craftsmen Training Scheme and CITS','C. Medical education','D. Primary education'],ans:'B',exp:'DGT oversees CTS (Craftsmen Training Scheme), CITS, and other vocational training programs.'},
{n:541,cat:'iti',tag:'ITI',q:'The total number of ITI seats in Maharashtra is approximately:',opts:['A. 50,000','B. 1,00,000','C. 1,50,000','D. 2,50,000'],ans:'C',exp:'Maharashtra has approximately 1.5 lakh ITI seats.'},
{n:542,cat:'iti',tag:'ITI',q:'Which body has the authority to reject ITI accreditation applications (post-2017)?',opts:['A. QCI','B. DGT','C. State Government','D. NSDC'],ans:'B',exp:'Post July 2017, DGT handles accreditation and can approve or reject applications.'},
{n:543,cat:'iti',tag:'ITI',q:'The IMC concept promotes which style of governance for ITIs?',opts:['A. Centralized government control','B. Community and industry-led decentralized governance','C. University-style governance','D. International governance standards'],ans:'B',exp:'IMC promotes community and industry-led decentralized governance for ITIs.'},
{n:544,cat:'iti',tag:'ITI',q:'An ITI with IMC registered as a Society can receive:',opts:['A. Only state grants','B. Central Government funds and manage them autonomously','C. Only foreign funding','D. Only donation-based funding'],ans:'B',exp:'IMC with Society status can receive Central Government interest-free loan and manage finances autonomously.'},
{n:545,cat:'iti',tag:'ITI',q:'Programming Assistant trade in Maharashtra ITI received how many applications approximately?',opts:['A. 44,200','B. 47,783','C. 52,545','D. 62,215'],ans:'B',exp:'Programming Assistant received 47,783 applications in Maharashtra ITI admissions.'},
{n:546,cat:'iti',tag:'ITI',q:'The Electrician trade had more than how many applications in Maharashtra?',opts:['A. 1 lakh','B. 1.5 lakh','C. 2 lakh','D. 2.5 lakh'],ans:'B',exp:'Electrician had 1,57,703 applications — more than 1.5 lakh applications.'},
{n:547,cat:'iti',tag:'ITI',q:'Maharashtra\'s 5 new ITIs focus on training skilled manpower for:',opts:['A. Only local industries','B. Global requirement of skilled manpower','C. Only government jobs','D. Only IT sector'],ans:'B',exp:'5 new ITIs were launched to meet the global requirement of skilled manpower.'},
{n:548,cat:'iti',tag:'ITI',q:'The transition of accreditation from QCI back to DGT happened in:',opts:['A. January 2017','B. July 2017','C. January 2018','D. July 2018'],ans:'B',exp:'In July 2017, accreditation responsibility was shifted back from QCI to DGT.'},
{n:549,cat:'iti',tag:'ITI',q:'How many NCVT-affiliated ITIs exist in Maharashtra approximately?',opts:['A. 200','B. 300','C. 411','D. 500'],ans:'C',exp:'There are 411 ITIs in Maharashtra.'},
{n:550,cat:'iti',tag:'ITI',q:'The Industry Partner\'s role in ITI is primarily for:',opts:['A. Only providing funds','B. Leading and supporting upgradation process','C. Only recruitment of graduates','D. Only fund audit'],ans:'B',exp:'Industry Partner is associated with ITI to lead and support the process of upgradation.'},

// ── ADVANCED HISTORY (551-620) ──
{n:551,cat:'history',tag:'History',q:'The Sargent Report emphasized general education combined with:',opts:['A. Religious education','B. Career preparation for different occupations','C. Only technical knowledge','D. Agricultural training'],ans:'B',exp:'Sargent Report (1944): general education combined with career preparation for different occupations.'},
{n:552,cat:'history',tag:'History',q:'The Working Group on Vocationalization (1977) was set up to examine implementation of:',opts:['A. Kothari Commission recommendations','B. NPE 1986 guidelines','C. CABE directives','D. NCVT guidelines'],ans:'A',exp:'The Working Group was set up to examine implementation of Kothari Commission\'s recommendations.'},
{n:553,cat:'history',tag:'History',q:'After Kothari Commission, which body endorsed 10+2+3 pattern?',opts:['A. Parliament','B. CABE','C. UGC','D. DGT'],ans:'B',exp:'CABE (Central Advisory Board of Education) endorsed the 10+2+3 pattern.'},
{n:554,cat:'history',tag:'History',q:'CABE reiterated +2 level should not be regarded merely as:',opts:['A. Vocational preparation','B. Preparatory stage for college','C. Technical training','D. Career development'],ans:'B',exp:'CABE reiterated that the +2 stage should not be regarded merely as preparatory stage for college.'},
{n:555,cat:'history',tag:'History',q:'In which year did India adopt NCF (National Curriculum Framework)?',opts:['A. 2000','B. 2003','C. 2005','D. 2007'],ans:'C',exp:'National Curriculum Framework (NCF) was adopted in 2005.'},
{n:556,cat:'history',tag:'History',q:'Which commission examined secondary education and recommended the multipurpose school concept?',opts:['A. Radhakrishnan Commission','B. Mudaliar Commission','C. Kothari Commission','D. Sabanayagam Working Group'],ans:'B',exp:'Mudaliar Commission (Secondary Education Commission, 1952-53) recommended the multipurpose school concept.'},
{n:557,cat:'history',tag:'History',q:'The Radhakrishnan Commission of 1948 was specifically about:',opts:['A. Primary education','B. University education','C. Secondary education','D. Vocational education only'],ans:'B',exp:'Radhakrishnan Commission (1948) was the University Education Commission.'},
{n:558,cat:'history',tag:'History',q:'NSDC\'s primary purpose was to:',opts:['A. Only fund government training','B. Promote private sector involvement in skill development','C. Replace ITIs','D. Certify all training programs'],ans:'B',exp:'NSDC established in 2008 to promote private sector involvement in skill development.'},
{n:559,cat:'history',tag:'History',q:'The Wood-Abbot Committee of 1936 specifically recommended polytechnics to offer:',opts:['A. Master\'s degrees','B. Diploma-level technical education','C. Bachelor\'s degrees','D. PhD programs'],ans:'B',exp:'Wood-Abbot Committee (1936) recommended establishment of polytechnics for diploma-level technical education.'},
{n:560,cat:'history',tag:'History',q:'NEP 2020 mentions integration of VE from:',opts:['A. Class 1','B. Class 6','C. Class 9','D. Class 11'],ans:'B',exp:'NEP 2020 focuses on mainstreaming VE from Grade 6.'},
{n:561,cat:'history',tag:'History',q:'Programme of Action (POA) was prepared in:',opts:['A. 1986','B. 1988','C. 1990','D. 1992'],ans:'D',exp:'Programme of Action (POA) was prepared in 1992 for implementation of NPE 1986.'},
{n:562,cat:'history',tag:'History',q:'Hunter Commission in 1882 examined problems related to:',opts:['A. University education only','B. Vocational and technical education','C. Primary education only','D. Higher education only'],ans:'B',exp:'Indian Education Commission (Hunter Commission, 1882) examined problems of education especially VE.'},
{n:563,cat:'history',tag:'History',q:'NVEQF provided clear pathways that were later integrated into:',opts:['A. NCVT','B. NSQF','C. NTC','D. AITT'],ans:'B',exp:'In 2013, NVEQF was subsumed into the National Skills Qualifications Framework (NSQF).'},
{n:564,cat:'history',tag:'History',q:'India\'s VE history shows that the Guru-Shishya tradition was:',opts:['A. Only religious in nature','B. An occupational skills transfer mechanism','C. Academic in focus','D. Government controlled'],ans:'B',exp:'Guru-Shishya tradition was primarily an occupational skills transfer mechanism.'},
{n:565,cat:'history',tag:'History',q:'Hartog Committee (1929) emphasized VE\'s role in:',opts:['A. Pure academic development','B. Economic development of the nation','C. International relations','D. Religious education'],ans:'B',exp:'Hartog Committee emphasized the vital role of VE in economic development.'},
{n:566,cat:'history',tag:'History',q:'The year MSDE was created also saw launch of what?',opts:['A. PMKVY','B. NSDC','C. MSDE was created in 2014 along with new policy direction for skills','D. NCF 2014'],ans:'C',exp:'MSDE was created in 2014 as a dedicated Ministry for Skill Development.'},
{n:567,cat:'history',tag:'History',q:'PMKVY 1.0 duration was approximately:',opts:['A. 6 months','B. 1 year','C. 2 years','D. 4 years'],ans:'B',exp:'PMKVY 1.0 ran for approximately 1 year in 2015.'},
{n:568,cat:'history',tag:'History',q:'Skills Build diplomas at ITIs/NSTIs lead to certification valid for:',opts:['A. Only Maharashtra','B. National and international recognition','C. Only government jobs','D. Only India'],ans:'B',exp:'Skills Build 2-year advanced diploma is valuable and has national/international recognition.'},
{n:569,cat:'history',tag:'History',q:'NEP 2020 targets 50% VE exposure by:',opts:['A. 2022','B. 2023','C. 2025','D. 2030'],ans:'C',exp:'NEP 2020 target: at least 50% of learners should have exposure to VE by 2025.'},
{n:570,cat:'history',tag:'History',q:'India\'s NVEQF was launched under which ministry at the time?',opts:['A. Ministry of Labour','B. Ministry of Human Resource Development','C. MSDE (didn\'t exist then)','D. Ministry of Commerce'],ans:'B',exp:'NVEQF (2011) was launched under the Ministry of Human Resource Development (MHRD).'},
{n:571,cat:'history',tag:'History',q:'The Sapru Committee (1934) focused on VE\'s role in:',opts:['A. Academic development','B. Economic development','C. Social development','D. Political development'],ans:'B',exp:'Sapru Enquiry Committee (1934) emphasized the vital role of VE in economic development.'},
{n:572,cat:'history',tag:'History',q:'The IIE was initially under which Ministry before being transferred to MSDE?',opts:['A. Ministry of Education','B. Ministry of Industry (now MSME)','C. Ministry of Labour','D. Ministry of Finance'],ans:'B',exp:'IIE was established under the erstwhile Ministry of Industry (now Ministry of MSME).'},
{n:573,cat:'history',tag:'History',q:'The Mudaliar Commission recommended vocational courses to be introduced after:',opts:['A. 5 years of schooling','B. 6 years of schooling','C. 8 years of schooling','D. 10 years of schooling'],ans:'C',exp:'Mudaliar Commission: diversification after 8 years with vocational and craft-based training.'},
{n:574,cat:'history',tag:'History',q:'The MCVC (1988) was styled under the recommendations of which policy?',opts:['A. Mudaliar Commission 1952','B. NPE 1986','C. Kothari Commission','D. NCF 2005'],ans:'B',exp:'MCVC was introduced by MHRD in 1988 based on the idea from National Policy on Education (NPE 1986).'},
{n:575,cat:'history',tag:'History',q:'B.Voc degree is awarded by:',opts:['A. ITIs','B. Universities and colleges under UGC guidelines','C. NSDC','D. State Boards'],ans:'B',exp:'B.Voc (Bachelor of Vocation) is a 3-year UG degree program offered by universities/colleges.'},
{n:576,cat:'history',tag:'History',q:'Which decade saw the major policy push for vocationalization of secondary education?',opts:['A. 1960s','B. 1970s','C. 1980s','D. 2010s'],ans:'C',exp:'The 1980s saw the major policy push — NPE 1986 with 10% by 1990, 25% by 1995 targets.'},
{n:577,cat:'history',tag:'History',q:'MOOC in educational context stands for:',opts:['A. Multi Online Open Course','B. Massive Open Online Course','C. Mobile Open Online Certification','D. Managed Open Online Course'],ans:'B',exp:'MOOC = Massive Open Online Course.'},
{n:578,cat:'history',tag:'History',q:'Skills Build platform trains ITI/NSTI faculty in:',opts:['A. Advanced engineering','B. Basic AI Skills','C. English language','D. Management skills'],ans:'B',exp:'Skills Build will train ITI and NSTI faculty in basic Artificial Intelligence (AI) Skills.'},
{n:579,cat:'history',tag:'History',q:'Which MPSC 2021 statement about National Knowledge Commission is CORRECT?',opts:['A. It was established in 2003','B. It was chaired by Dr. D.S. Kothari','C. It was established in 2005 under Sam Pitroda','D. It was established by NEP 2020'],ans:'C',exp:'National Knowledge Commission was established in 2005 under chairmanship of Sam Pitroda.'},
{n:580,cat:'history',tag:'History',q:'The working group of 1985 (Kulandaiswamy) proposed a system with:',opts:['A. Only government institutions','B. Multiple levels of vocationalization with management system','C. Only ITI-based training','D. International certifications only'],ans:'B',exp:'Kulandaiswamy Working Group (1985) proposed vocationalization at different levels with a well-knit management system.'},

// ── ADVANCED SUPW (581-640) ──
{n:581,cat:'supw',tag:'SUPW',q:'In SUPW, the word "Productive" refers to work that:',opts:['A. Generates profit only','B. Results in goods or services of value','C. Is physically tiring','D. Is done in factories'],ans:'B',exp:'Productive in SUPW means work that results in goods or services of value to the community.'},
{n:582,cat:'supw',tag:'SUPW',q:'SUPW differs from regular school work because it:',opts:['A. Has no academic component','B. Directly results in tangible goods or community services','C. Is done at home only','D. Is assessed by external examiners'],ans:'B',exp:'SUPW results in tangible goods or services beneficial to the community.'},
{n:583,cat:'supw',tag:'SUPW',q:'Which SUPW activity is appropriate for lower primary students?',opts:['A. Repairing electrical appliances','B. Making squash and pickles','C. Paper folding and crafts','D. Cloth dyeing'],ans:'C',exp:'Paper folding and paper crafts are appropriate SUPW activities for lower primary students.'},
{n:584,cat:'supw',tag:'SUPW',q:'At upper primary level, SUPW activities include:',opts:['A. Repairing domestic appliances','B. Stitching and knitting work','C. Cloth dyeing and printing','D. Garment making for sale'],ans:'B',exp:'Stitching and knitting work is an upper primary SUPW activity.'},
{n:585,cat:'supw',tag:'SUPW',q:'At secondary level, which SUPW activity involves food preservation?',opts:['A. Growing vegetables','B. Preparation of squash, jam, pickles','C. Campus cleaning','D. Paper crafts'],ans:'B',exp:'Preparation of squash, jam, pickles, candles etc. is a secondary-stage SUPW activity.'},
{n:586,cat:'supw',tag:'SUPW',q:'SUPW contributes to which aspect of national development?',opts:['A. Military strength','B. Social and economic development through skilled citizens','C. International relations','D. Political governance'],ans:'B',exp:'SUPW contributes to social and economic development by creating skilled, productive citizens.'},
{n:587,cat:'supw',tag:'SUPW',q:'Work experience programme was conceived by:',opts:['A. Mudaliar Commission','B. Kothari Commission 1964-66','C. Ishwarbhai Patel Committee','D. Sargent Report'],ans:'B',exp:'Kothari Commission (1964-66) conceived the "Work Experience" programme as participation in productive work.'},
{n:588,cat:'supw',tag:'SUPW',q:'SUPW activities should be done in a way that develops in students the habit of:',opts:['A. Only exam preparation','B. Working together and helping one another','C. Individual competition','D. Following strict rules'],ans:'B',exp:'SUPW develops habits of working together and helping one another.'},
{n:589,cat:'supw',tag:'SUPW',q:'A key outcome of SUPW is that students understand:',opts:['A. Only theoretical concepts','B. How academic knowledge applies to real-world problems','C. Only historical events','D. Only scientific formulas'],ans:'B',exp:'SUPW helps students understand how academic knowledge applies to real-world, day-to-day problems.'},
{n:590,cat:'supw',tag:'SUPW',q:'NCERT specifies that SUPW activities should help develop:',opts:['A. Only physical fitness','B. Total personality including values','C. Memorization skills','D. Language skills only'],ans:'B',exp:'NCERT criteria: help develop total personality of children including values, problem-solving, creative thinking.'},
{n:591,cat:'supw',tag:'SUPW',q:'Pre-vocational education prepares students for:',opts:['A. University admission','B. Work and vocational education in later years','C. Military service','D. Political careers'],ans:'B',exp:'Pre-vocational education prepares students for work and for vocational education in later years.'},
{n:592,cat:'supw',tag:'SUPW',q:'Which characteristic of SUPW makes the learner understand the purpose of work?',opts:['A. Manual','B. Productive','C. Purposive','D. Meaningful'],ans:'C',exp:'Purposive = learner understands "Why" and "for what" — performs work intelligently.'},
{n:593,cat:'supw',tag:'SUPW',q:'SUPW teaches students to:',opts:['A. Only theoretical concepts','B. Appreciate social values of manual work','C. Focus only on academic achievement','D. Avoid community service'],ans:'B',exp:'SUPW teaches students to appreciate social values of manual work and dignity of labour.'},
{n:594,cat:'supw',tag:'SUPW',q:'Which stage includes SUPW activity of making clay/papier-mache models?',opts:['A. Lower primary','B. Upper primary','C. Secondary','D. Higher secondary'],ans:'B',exp:'Making clay/papier-mache models is an upper primary SUPW activity.'},
{n:595,cat:'supw',tag:'SUPW',q:'SUPW activities develop among students the will to:',opts:['A. Only compete academically','B. Contribute to societal development through work','C. Earn maximum salary','D. Avoid physical work'],ans:'B',exp:'SUPW develops in students the will to contribute to societal development through work.'},
{n:596,cat:'supw',tag:'SUPW',q:'Which committee recommended SUPW as part of school curriculum?',opts:['A. Kothari Commission','B. Ishwarbhai Patel Committee 1977','C. Mudaliar Commission','D. Radhakrishnan Commission'],ans:'B',exp:'Ishwarbhai Patel Committee (1977) recommended including SUPW in school curriculum.'},
{n:597,cat:'supw',tag:'SUPW',q:'SUPW specifically develops which type of respect?',opts:['A. Respect for authority only','B. Respect for manual workers and labour','C. Respect for academic scholars','D. Respect for wealth'],ans:'B',exp:'SUPW develops respect for manual workers and the dignity of labour.'},
{n:598,cat:'supw',tag:'SUPW',q:'"Work experience" as conceived by Kothari Commission includes work in:',opts:['A. Only schools','B. School, home, workshop, farm, factory','C. Only factories','D. Only farms'],ans:'B',exp:'Kothari Commission: work experience = participation in productive work in school, home, workshop, farm, factory.'},
{n:599,cat:'supw',tag:'SUPW',q:'SUPW activities help students understand social processes of:',opts:['A. Government and politics','B. Production and services in the community','C. International trade','D. Financial markets'],ans:'B',exp:'SUPW helps students understand the social processes of production of goods and provision of services.'},
{n:600,cat:'supw',tag:'SUPW',q:'The most important outcome of SUPW is:',opts:['A. Academic certificates','B. Development of work ethic, skills, and positive attitudes','C. Factory employment','D. University admission'],ans:'B',exp:'Most important outcome: development of work ethic, practical skills, and positive attitudes toward work.'},
{n:601,cat:'supw',tag:'SUPW',q:'Which statement about Pre-Vocational Education is CORRECT?',opts:['A. It is same as formal VE','B. It is a preparatory phase, not full-fledged VT','C. It is only for Class 11-12','D. It provides university-level training'],ans:'B',exp:'Pre-vocational education is a preparatory phase, not full-fledged vocational training.'},
{n:602,cat:'supw',tag:'SUPW',q:'Revised NPE (1992) treats SUPW as:',opts:['A. Part of formal academic education','B. Pre-vocational education from Classes VI-X','C. Post-vocational activity','D. Extracurricular activity only'],ans:'B',exp:'Revised NPE (1992): SUPW treated as pre-vocational education, Classes VI-X.'},
{n:603,cat:'supw',tag:'SUPW',q:'Samagra Shiksha Abhiyan treats pre-vocational component for:',opts:['A. Classes I-V only','B. Classes VI-VIII (foundational) up to X','C. Classes IX-XII only','D. Only primary level'],ans:'B',exp:'Samagra Shiksha Abhiyan: pre-vocational from VI-VIII as foundational, extending up to Class X.'},
{n:604,cat:'supw',tag:'SUPW',q:'The "Meaningful" characteristic of SUPW relates work to:',opts:['A. Global standards','B. Needs of learner and community','C. Academic syllabus','D. International curriculum'],ans:'B',exp:'Meaningful in SUPW: work related to needs of learner and the community.'},
{n:605,cat:'supw',tag:'SUPW',q:'SUPW at lower primary level avoids complex skills because:',opts:['A. Schools lack equipment','B. Children are young and need age-appropriate activities','C. Teachers are not trained','D. Government rules prohibit it'],ans:'B',exp:'Lower primary SUPW is simple and age-appropriate — paper crafts, gardening, campus cleaning.'},
{n:606,cat:'supw',tag:'SUPW',q:'An outcome of SUPW is the development of:',opts:['A. Political ambitions','B. Productive citizens who contribute to economy','C. Academic researchers','D. Government officials'],ans:'B',exp:'SUPW helps develop productive citizens who can contribute meaningfully to the economy.'},
{n:607,cat:'supw',tag:'SUPW',q:'The importance of SUPW in removing social stigma applies to:',opts:['A. Reservation system','B. Bias against manual and technical work','C. Gender discrimination','D. Regional discrimination'],ans:'B',exp:'SUPW removes social bias against manual and technical work.'},
{n:608,cat:'supw',tag:'SUPW',q:'SUPW as part of school curriculum begins at which class according to NEP 2020?',opts:['A. Class 1','B. Class 6','C. Class 9','D. Class 11'],ans:'B',exp:'NEP 2020: Pre-vocational/SUPW begins from Class 6 as foundational level.'},
{n:609,cat:'supw',tag:'SUPW',q:'SUPW connects classroom learning with:',opts:['A. Only examination preparation','B. Real-world work and community life','C. Political activities','D. International programs'],ans:'B',exp:'SUPW connects classroom learning with real-world work and community life.'},
{n:610,cat:'supw',tag:'SUPW',q:'Which government body developed detailed criteria for SUPW activities in schools?',opts:['A. CBSE only','B. NCERT','C. UGC','D. AICTE'],ans:'B',exp:'NCERT developed detailed criteria for SUPW activities in schools.'},

// ── ADVANCED PROBLEMS (611-650) ──
{n:611,cat:'problems',tag:'Problems',q:'The problem of "limited curriculum" in VE institutions directly leads to:',opts:['A. Better employment outcomes','B. Students lacking knowledge of social objectives and human relations','C. Increase in student enrollment','D. Better industry linkage'],ans:'B',exp:'Limited curriculum means students cannot acquire knowledge of social objectives and human relations of production.'},
{n:612,cat:'problems',tag:'Problems',q:'India\'s VE system faces a challenge of high drop-out rates particularly at:',opts:['A. Primary level','B. Secondary level','C. Graduate level','D. Post-graduate level'],ans:'B',exp:'High drop-out rate at secondary level is a significant problem for VE.'},
{n:613,cat:'problems',tag:'Problems',q:'The "English medium" barrier in VE primarily affects students from:',opts:['A. Urban English medium schools','B. Hindi medium or regional language medium backgrounds','C. Foreign language backgrounds','D. Private English schools'],ans:'B',exp:'English as medium of instruction creates barrier for students from Hindi/regional medium backgrounds.'},
{n:614,cat:'problems',tag:'Problems',q:'Shortage of VET institutions results in:',opts:['A. More enrollment per institution','B. Many eligible candidates unable to access VE','C. Better quality of education','D. International competition'],ans:'B',exp:'Shortage of institutions means many eligible candidates cannot access VE.'},
{n:615,cat:'problems',tag:'Problems',q:'Poor VE-industry linkage most severely impacts:',opts:['A. Government funding','B. Employment placement rates of VE graduates','C. Academic results','D. Teacher salaries'],ans:'B',exp:'Poor industry linkage leads to low employment rates as industry needs are not met by training.'},
{n:616,cat:'problems',tag:'Problems',q:'The problem of staff retention in VE institutions is primarily due to:',opts:['A. Very high teacher salaries','B. Better career options for qualified technical faculty in industry','C. Too many students','D. Government regulations'],ans:'B',exp:'Qualified technical faculty often find better career options in industry, leading to retention problems.'},
{n:617,cat:'problems',tag:'Problems',q:'Continuous education in VE is needed because:',opts:['A. Government policy requires it','B. Technology and work processes constantly change and evolve','C. It increases fees','D. Students demand it'],ans:'B',exp:'Technology and work processes constantly evolve, making continuous education essential to prevent outdated skills.'},
{n:618,cat:'problems',tag:'Problems',q:'The demand-supply skill gap in India is:',opts:['A. Gradually reducing on its own','B. A serious challenge requiring systematic VE intervention','C. Not relevant to industry','D. Only in IT sector'],ans:'B',exp:'The huge demand-supply skill gap in India requires systematic VE intervention.'},
{n:619,cat:'problems',tag:'Problems',q:'Which problem of VE leads to failure to update workforce with new technologies?',opts:['A. Medium of instruction','B. Shortage of continuous education','C. Lack of industry linkage','D. High dropout rates'],ans:'B',exp:'Shortage of continuous education means workforce skills become outdated with advancing technology.'},
{n:620,cat:'problems',tag:'Problems',q:'Multiple ministries managing VE independently leads to:',opts:['A. Better coordination','B. Fragmented, duplicated efforts and policies','C. More funding','D. International recognition'],ans:'B',exp:'Multiple ministries managing independently leads to fragmented implementation and duplication of efforts.'},
{n:621,cat:'problems',tag:'Problems',q:'Practical training inadequacy means trainees are:',opts:['A. Over-qualified','B. Theoretically informed but cannot execute workshop/industry tasks','C. Under-enrolled','D. Lacking academic knowledge'],ans:'B',exp:'Insufficient practical exposure means trainees cannot establish small workshops or work in industries effectively.'},
{n:622,cat:'problems',tag:'Problems',q:'The solution to the English medium barrier in VE would be:',opts:['A. Only English teaching','B. Teaching in regional languages and mother tongue','C. Eliminating all VE courses','D. Importing teachers from abroad'],ans:'B',exp:'Teaching VE in regional languages and mother tongue would overcome the English medium barrier.'},
{n:623,cat:'problems',tag:'Problems',q:'Poor industry linkage creates a mismatch between:',opts:['A. Teachers and students','B. Skills taught and skills demanded by employers','C. Government and private sector','D. State and central government'],ans:'B',exp:'Poor industry linkage creates mismatch between skills taught in VE institutions and skills demanded by employers.'},
{n:624,cat:'problems',tag:'Problems',q:'Rapid technological changes make which VE problem more severe?',opts:['A. English medium barrier','B. Outdated workforce and shortage of continuous education','C. Lack of institutions','D. Student dropout'],ans:'B',exp:'Rapid technological changes make the shortage of continuous education problem more severe.'},
{n:625,cat:'problems',tag:'Problems',q:'VE institutions\' limited provision of liberal education results in:',opts:['A. Better technical skills','B. Graduates lacking social awareness and human relations skills','C. More international jobs','D. Better industry placement'],ans:'B',exp:'Limited curriculum produces graduates who lack knowledge of social objectives and human relations.'},
{n:626,cat:'problems',tag:'Problems',q:'The problem of "shortage of VET institutions" is most felt in:',opts:['A. Metro cities only','B. Rural areas and smaller towns','C. Only in southern states','D. Only in northern states'],ans:'B',exp:'The shortage of VET institutions is most acutely felt in rural areas and smaller towns.'},
{n:627,cat:'problems',tag:'Problems',q:'Lack of VE-industry feedback loop prevents:',opts:['A. Student enrollment','B. Curriculum updates based on current industry requirements','C. Government funding','D. Teacher training'],ans:'B',exp:'Without industry feedback, VE curriculum cannot be updated to match current industry requirements.'},
{n:628,cat:'problems',tag:'Problems',q:'The problem of VE in India that relates to "qualification barrier" is:',opts:['A. NTC not accepted for some higher posts','B. Too many qualifications required','C. English medium only','D. Age restrictions'],ans:'A',exp:'NTC is only for subordinate posts, creating qualification barriers for advancement.'},
{n:629,cat:'problems',tag:'Problems',q:'Training partnerships with industries can solve which VE problem?',opts:['A. Medium of instruction','B. Inadequate industry linkage and placement issues','C. Student dropout','D. Teacher shortage only'],ans:'B',exp:'Training partnerships with industries can solve inadequate industry linkage and improve placement outcomes.'},
{n:630,cat:'problems',tag:'Problems',q:'A VE graduate who cannot update skills faces the problem of:',opts:['A. Too many qualifications','B. Becoming economically marginalized as technology advances','C. Over-employment','D. Excessive certification'],ans:'B',exp:'Without continuous education, VE graduates become economically marginalized as technology advances.'},

// ── ADVANCED PMKVY (631-720) ──
{n:631,cat:'pmkvy',tag:'PMKVY',q:'In PMKVY, "Short Term Training" qualification packs are defined by:',opts:['A. DGT alone','B. Sector Skill Councils (SSCs)','C. State governments','D. ITI principals'],ans:'B',exp:'STT qualification packs are defined by Sector Skill Councils (SSCs) in partnership with industry.'},
{n:632,cat:'pmkvy',tag:'PMKVY',q:'Sector Skill Councils (SSCs) under NSDC are responsible for:',opts:['A. Running training centers','B. Defining National Occupational Standards and QPs','C. Providing loans to trainees','D. Setting up ITIs'],ans:'B',exp:'SSCs define National Occupational Standards (NOS) and Qualification Packs (QPs) under PMKVY.'},
{n:633,cat:'pmkvy',tag:'PMKVY',q:'PMKVY assessment is conducted by:',opts:['A. Training Partners','B. Third-party Assessment Bodies','C. State Governments','D. NSDC directly'],ans:'B',exp:'Assessment under PMKVY is conducted by independent Third-party Assessment Bodies.'},
{n:634,cat:'pmkvy',tag:'PMKVY',q:'Under PMKVY, trainers are also known as:',opts:['A. Faculty','B. Master Trainers or Instructors','C. Apprentices','D. Trade test examiners'],ans:'B',exp:'Trainers under PMKVY are called Master Trainers or Instructors.'},
{n:635,cat:'pmkvy',tag:'PMKVY',q:'PMKVY 4.0 includes emphasis on:',opts:['A. Traditional skills only','B. Emerging and future-oriented skills like AI, ML, IoT','C. Only agriculture skills','D. Only construction skills'],ans:'B',exp:'PMKVY 4.0 focuses on new age emerging skills: AI, ML, IoT, drones, robotic processes etc.'},
{n:636,cat:'pmkvy',tag:'PMKVY',q:'Under PMKVY STT, training is provided at:',opts:['A. Only government centers','B. PMKVY Training Centers (PTC) run by Training Partners','C. Only ITIs','D. Only schools'],ans:'B',exp:'STT training is provided at PMKVY Training Centers (PTC) run by Training Partners empaneled with NSDC/SSCs.'},
{n:637,cat:'pmkvy',tag:'PMKVY',q:'Post assessment, successful PMKVY candidates receive certificate from:',opts:['A. State Government','B. Sector Skill Council','C. DGT','D. Ministry of Education'],ans:'B',exp:'Successful candidates receive certificates from the respective Sector Skill Council.'},
{n:638,cat:'pmkvy',tag:'PMKVY',q:'RPL Stage 3 involves:',opts:['A. Pre-screening','B. Orientation','C. Application/Registration','D. Assessment'],ans:'C',exp:'RPL Stage 3 is Application/Registration.'},
{n:639,cat:'pmkvy',tag:'PMKVY',q:'RPL Stage 2 involves:',opts:['A. Pre-screening','B. Orientation (General or NOS-specific)','C. Assessment','D. Certification'],ans:'B',exp:'RPL Stage 2 is Orientation (either General or Orientation with NOS depending on pre-screening result).'},

{n:810,cat:'supw',tag:'SUPW',q:'SUPW development of positive work attitudes will ultimately benefit:',opts:['A. Only the individual student','B. The individual, community, and national economy','C. Only teachers','D. Only industries'],ans:'B',exp:'Positive work attitudes from SUPW benefit the individual, community, and contribute to national economic development.'},
{n:811,cat:'pmkvy',tag:'PMKVY',q:'Skill India Programme (2025) outlay of ₹8,800 crore covers period:',opts:['A. 2020-21 to 2023-24','B. 2022-23 to 2025-26','C. 2023-24 to 2026-27','D. 2021-22 to 2024-25'],ans:'B',exp:'Skill India Programme approved by Cabinet in Feb 2025 has ₹8,800 crore outlay for 2022-23 to 2025-26.'},
{n:812,cat:'schemes',tag:'Schemes',q:'PM YUVA Yojana\'s 7 lakh+ students were trained through:',opts:['A. Only online mode','B. Mixed mode through 3050 institutes over 5 years','C. Only residential camps','D. Only government institutions'],ans:'B',exp:'PM YUVA Yojana trained 7 lakh+ students through 3050 institutes over 5 years (2016-17 to 2020-21).'},

{n:814,cat:'misc',tag:'Mixed',q:'The concept of "Technical and Vocational Education and Training" (TVET) globally includes:',opts:['A. Only vocational skills','B. Both technical knowledge and vocational practical skills','C. Only academic knowledge','D. Only engineering'],ans:'B',exp:'TVET globally includes both technical knowledge components and vocational practical skill development.'},
{n:815,cat:'iti',tag:'ITI',q:'The total IMC composition includes Industry Partner nominees (4) plus State nominees (5) plus:',opts:['A. 1 DGT representative','B. 1 Principal (ex-officio member secretary)','C. 1 parent representative','D. 1 student representative'],ans:'B',exp:'Total IMC: 4 (IP) + 5 (State) + 1 Principal (ex-officio member secretary) = 10 members.'},
{n:816,cat:'history',tag:'History',q:'The NSDC is a not-for-profit organization that is:',opts:['A. Fully owned by government','B. A Public-Private Partnership with majority private ownership','C. Fully private','D. International organization'],ans:'B',exp:'NSDC is a unique Public-Private Partnership company with majority private ownership.'},

{n:818,cat:'pmkvy',tag:'PMKVY',q:'PMKVY certification is an assurance of:',opts:['A. Employment guarantee','B. Competency in specific vocational skills as per NSQF','C. University admission','D. Government job preference'],ans:'B',exp:'PMKVY certification assures competency in specific vocational skills as per NSQF standards.'},
{n:819,cat:'schemes',tag:'Schemes',q:'SANKALP\'s fourth KRA on PPP expands skills access through:',opts:['A. Only government investment','B. Engaging private sector partners to co-invest in skill development','C. International grants only','D. Only CSR funding'],ans:'B',exp:'SANKALP PPP KRA engages private sector partners to co-invest in skill development.'},
{n:820,cat:'maharashtra',tag:'Maharashtra',q:'MSSDS partners with international agencies to bring:',opts:['A. Only foreign investment','B. Global best practices in skill development to Maharashtra','C. Only foreign students','D. Only international certifications'],ans:'B',exp:'MSSDS partners with international agencies to bring global best practices to Maharashtra\'s skill ecosystem.'},
{n:821,cat:'misc',tag:'Mixed',q:'CTS and CITS together form the backbone of India\'s:',opts:['A. Academic education system','B. Industrial Training Institute (ITI) system','C. University education system','D. School education system'],ans:'B',exp:'CTS and CITS together form the backbone of India\'s ITI system.'},
{n:822,cat:'iti',tag:'ITI',q:'The Society Registration Act 1860 under which IMC is registered is used because:',opts:['A. It reduces taxes','B. It allows IMC to have legal entity, hold property, and manage funds','C. It is mandatory by NCVT','D. It provides immunity from audit'],ans:'B',exp:'Registration under Society Registration Act 1860 gives IMC legal entity to hold property and manage funds.'},
{n:823,cat:'history',tag:'History',q:'The National Policy on Education 1986 set a target for what year to achieve 25% VE enrollment?',opts:['A. 1990','B. 1992','C. 1995','D. 2000'],ans:'C',exp:'NPE 1986 targets: 10% by 1990, 25% by 1995.'},
{n:824,cat:'supw',tag:'SUPW',q:'SUPW specifically brings together cognitive and:',opts:['A. Only emotional development','B. Psychomotor and affective (attitudinal) development','C. Only academic development','D. Only social development'],ans:'B',exp:'SUPW brings together cognitive, psychomotor, and affective (attitudinal) development.'},
{n:825,cat:'pmkvy',tag:'PMKVY',q:'The special attention to Aspirational Districts in PMKVY refers to:',opts:['A. Only state capitals','B. Districts identified by NITI Aayog as most underdeveloped needing priority intervention','C. Only IT hubs','D. Only coastal districts'],ans:'B',exp:'Aspirational Districts are identified by NITI Aayog as most underdeveloped requiring priority intervention.'},
{n:826,cat:'schemes',tag:'Schemes',q:'PM YUVA Yojana\'s approach to entrepreneurship education through MOOCs allows:',opts:['A. Only residential students','B. Any student across India to access entrepreneurship education free of charge','C. Only postgraduate students','D. Only premium institution students'],ans:'B',exp:'MOOCs allow any student across India to access free entrepreneurship education.'},
{n:827,cat:'maharashtra',tag:'Maharashtra',q:'MSInS provides grants to incubators under the provision that each incubator:',opts:['A. Only trains women','B. Supports women-led startups and enterprises with mentoring and resources','C. Only does research','D. Only provides finance'],ans:'B',exp:'Incubators under WEC/MSInS support women-led startups and enterprises with mentoring and resources.'},
{n:828,cat:'misc',tag:'Mixed',q:'India\'s demographic dividend refers to:',opts:['A. High population leading to problems','B. Large working-age population that could drive economic growth if skilled','C. International migration of workers','D. Government dividend from investments'],ans:'B',exp:'Demographic dividend = large working-age population that can drive economic growth if they are skilled.'},
{n:829,cat:'iti',tag:'ITI',q:'The IDP (Institute Development Plan) is primarily a:',opts:['A. Annual financial report','B. 5-year strategic plan for ITI development with KPIs','C. Admission policy','D. Curriculum document'],ans:'B',exp:'IDP is a 5-year strategic development plan for the ITI with key performance indicators.'},
{n:830,cat:'history',tag:'History',q:'India\'s skill development ecosystem was significantly reformed post:',opts:['A. 2000','B. 2008-2009 (NSDC establishment and National Policy for Skill Development)','C. 2000-2001','D. 2020 only'],ans:'B',exp:'India\'s skill development ecosystem was significantly reformed post 2008-2009 with NSDC and National Policy.'},
{n:831,cat:'supw',tag:'SUPW',q:'The "Goods or Services" characteristic of SUPW distinguishes it from:',opts:['A. Academic work','B. Mere busywork or entertainment activities','C. Physical exercise','D. Religious activities'],ans:'B',exp:'The "goods or services" characteristic distinguishes SUPW from mere busywork or entertainment activities.'},
{n:832,cat:'pmkvy',tag:'PMKVY',q:'PM-NAPS (National Apprenticeship Promotion Scheme) included in Skill India Programme focuses on:',opts:['A. Only agricultural apprenticeship','B. On-the-job training through formal apprenticeship in industry','C. Only government apprenticeships','D. Only IT apprenticeships'],ans:'B',exp:'PM-NAPS focuses on formal apprenticeship training in industry for on-the-job skill development.'},
{n:833,cat:'schemes',tag:'Schemes',q:'JSS scheme\'s budget (100% GoI grant) is channeled through:',opts:['A. State governments only','B. MSDE through DJSS to NGOs','C. NSDC','D. DGT'],ans:'B',exp:'JSS budget flows through MSDE via DJSS (Directorate of Jan Shikshan Sansthan) to implementing NGOs.'},
{n:834,cat:'maharashtra',tag:'Maharashtra',q:'WEC\'s focus on evidence-based policy helps:',opts:['A. Only compile statistics','B. Create better-targeted programs for women entrepreneurs','C. Only inform academic research','D. Only prepare reports'],ans:'B',exp:'Evidence-based policy through WEC creates better-targeted programs for women entrepreneurs.'},
{n:835,cat:'misc',tag:'Mixed',q:'Which is the correct sequence of VET systems evolution in India?',opts:['A. ITIs → PMKVY → NSDC → NSQF','B. ITIs → NCVT → NSDC → NSQF → PMKVY','C. NSQF → ITIs → NCVT → PMKVY','D. PMKVY → ITIs → NSQF → NSDC'],ans:'B',exp:'Evolution: ITIs (1950s) → NCVT → NSDC (2008) → NSQF (2013) → PMKVY (2015).'},

{n:839,cat:'pmkvy',tag:'PMKVY',q:'COVID Warriors Customised Crash Course under PMKVY trained individuals in:',opts:['A. IT skills','B. Healthcare skills for pandemic response','C. Agricultural skills','D. Construction skills'],ans:'B',exp:'COVID Warriors Customised Crash Course trained individuals in healthcare skills for pandemic response.'},
{n:840,cat:'schemes',tag:'Schemes',q:'SDI/MES assessors are:',opts:['A. ITI principals','B. Third-party industry assessors','C. State government officials','D. Teachers of the institution'],ans:'B',exp:'MES assessment is done by third-party industry assessors to ensure impartiality.'},
{n:841,cat:'maharashtra',tag:'Maharashtra',q:'MSSDS was established in the 2011 when Maharashtra needed:',opts:['A. More academic colleges','B. A dedicated agency to coordinate skill development initiatives','C. More government schools','D. International investment only'],ans:'B',exp:'MSSDS was established in 2011 as Maharashtra needed a dedicated agency to coordinate skill development.'},
{n:842,cat:'misc',tag:'Mixed',q:'The IMC\'s 20% admission quota gives ITIs the flexibility to:',opts:['A. Admit wealthy students','B. Give preference to industry-sponsored candidates or local community needs','C. Only reject applicants','D. Only accept top merit students'],ans:'B',exp:'IMC\'s 20% quota allows ITIs to give preference to industry-sponsored candidates or address local needs.'},
{n:843,cat:'iti',tag:'ITI',q:'The 18 NSTIs (6 govt + 12 non-govt) together provide what?',opts:['A. Only NTC certificates','B. A national network for instructor training and quality upgrading of VET faculty','C. Only trade training','D. Only research programs'],ans:'B',exp:'The 18 NSTIs form a national network for instructor training and quality upgrading of VET faculty.'},
{n:844,cat:'history',tag:'History',q:'NSDC\'s unique PPP model means:',opts:['A. Only government controls it','B. Private sector has majority stake and drives skill development commercially','C. Only foreign investment','D. Only NGO management'],ans:'B',exp:'NSDC is a PPP with majority private ownership, driving commercial sustainability in skill development.'},
{n:845,cat:'supw',tag:'SUPW',q:'SUPW prepares students for life by helping them:',opts:['A. Only pass examinations','B. Develop life skills and work habits essential for adult life','C. Only secure government jobs','D. Only go abroad'],ans:'B',exp:'SUPW prepares students for adult life by developing essential life skills and positive work habits.'},

{n:849,cat:'misc',tag:'Mixed',q:'The Guru-Shishya tradition of VE transmission was valuable because it:',opts:['A. Was formally certified','B. Provided hands-on, personalized skill transfer over extended periods','C. Only covered academic subjects','D. Was internationally recognized'],ans:'B',exp:'Guru-Shishya tradition provided hands-on, personalized skill transfer over extended periods.'},
{n:850,cat:'misc',tag:'Mixed',q:'Which of the following represents correct order of PMKVY phases?',opts:['A. 1.0 (2015) → 2.0 (2016-20) → 3.0 (2021) → 4.0 (2022-26)','B. 1.0 (2013) → 2.0 (2015-19) → 3.0 (2020) → 4.0 (2021-25)','C. 1.0 (2014) → 2.0 (2015-18) → 3.0 (2019) → 4.0 (2020-24)','D. 1.0 (2016) → 2.0 (2017-21) → 3.0 (2022) → 4.0 (2023-26)'],ans:'A',exp:'Correct order: PMKVY 1.0 (2015) → 2.0 (2016-2020) → 3.0 (2021) → 4.0 (2022-2026).'},

{n:852,cat:'history',tag:'History',q:'The Skill Development Policy 2015 was aimed at:',opts:['A. Replacing ITIs','B. Creating a skilled, certified workforce of 500 million by 2022','C. Eliminating informal sector','D. Only IT skill development'],ans:'B',exp:'Skill Development Policy focused on creating a skilled, certified workforce to meet India\'s development needs.'},
{n:853,cat:'supw',tag:'SUPW',q:'The "U" in SUPW stands for:',opts:['A. Universal','B. Useful','C. Unique','D. Uniform'],ans:'B',exp:'U = Useful (Socially Useful Productive Work).'},

{n:855,cat:'schemes',tag:'Schemes',q:'SANKALP\'s focus on marginalized population aims to:',opts:['A. Reduce their numbers','B. Ensure equitable access to quality skill training','C. Train them separately only','D. Only provide financial aid'],ans:'B',exp:'SANKALP ensures equitable access to quality skill training for marginalized populations.'},
{n:856,cat:'maharashtra',tag:'Maharashtra',q:'Maharashtra Skill Development (MSSDS) feeds data to which assessment?',opts:['A. National survey only','B. Maharashtra State Skill Gap Assessment and Action Plan','C. International skill survey','D. Only ITI enrollment data'],ans:'B',exp:'MSSDS prepares Maharashtra State Skill Gap Assessment Report and Skill Development Action Plan.'},
{n:857,cat:'misc',tag:'Mixed',q:'The concept of "vertical mobility" in MES means workers can:',opts:['A. Move jobs geographically','B. Progress from lower to higher skill levels within a trade','C. Change from one trade to another','D. Move from private to government sector'],ans:'B',exp:'Vertical mobility in MES means workers can progress from lower to higher skill levels within a trade.'},

{n:860,cat:'supw',tag:'SUPW',q:'SUPW activities develop students\' ability to:',opts:['A. Only memorize information','B. Apply theoretical knowledge in practical situations','C. Only follow rules','D. Only compete for marks'],ans:'B',exp:'SUPW develops ability to apply theoretical knowledge in practical, real-world situations.'},

{n:862,cat:'schemes',tag:'Schemes',q:'The JSS curriculum is periodically updated by DJSS to ensure:',opts:['A. Only government requirements are met','B. Training remains relevant to current livelihood opportunities','C. Only academic standards','D. Only international compliance'],ans:'B',exp:'DJSS updates JSS curriculum periodically to ensure training remains relevant to current livelihood opportunities.'},
{n:863,cat:'maharashtra',tag:'Maharashtra',q:'The Skill, Employment, Entrepreneurship and Innovation Department of Maharashtra oversees:',opts:['A. Only education','B. Skill development, employment, entrepreneurship and innovation including MSSDS','C. Only industry','D. Only agriculture'],ans:'B',exp:'This department oversees all skill, employment, entrepreneurship and innovation activities including MSSDS.'},
{n:864,cat:'misc',tag:'Mixed',q:'A student who completes PMKVY STT and gets certified can use this for:',opts:['A. Only getting a government job','B. Employment in industry or starting a business','C. Only university admission','D. Only overseas employment'],ans:'B',exp:'PMKVY certification helps in getting employment in industry or enables starting a small business.'},
{n:865,cat:'iti',tag:'ITI',q:'What does the "Financial Autonomy" of IMC mean in practice?',opts:['A. IMC can collect fees without limits','B. IMC can make financial decisions within approved budget without prior approval','C. IMC is exempt from audit','D. IMC gets unlimited central funds'],ans:'B',exp:'Financial Autonomy means IMC can make financial decisions within the approved budget without prior approval.'},
{n:866,cat:'history',tag:'History',q:'The Programme of Action 1992 was important for VE because it:',opts:['A. Launched PMKVY','B. Accepted Kulandaiswamy model and provided framework for VE implementation','C. Established NSDC','D. Created MSDE'],ans:'B',exp:'POA 1992 accepted Kulandaiswamy model and provided concrete framework for VE implementation.'},
{n:867,cat:'supw',tag:'SUPW',q:'SUPW concept of "Productive" means the work must:',opts:['A. Generate income for school','B. Result in tangible goods or useful services for community','C. Be assigned by teacher only','D. Be done in teams only'],ans:'B',exp:'Productive in SUPW = results in tangible goods or useful services for the community.'},
{n:868,cat:'pmkvy',tag:'PMKVY',q:'PMKVY 2.0 achievement of 1.10 crore trainees was through:',opts:['A. Only government centers','B. Widespread Training Partner network across India','C. Only online mode','D. Only ITIs'],ans:'B',exp:'PMKVY 2.0 trained 1.10 crore through a widespread Training Partner network across India.'},
{n:869,cat:'schemes',tag:'Schemes',q:'The role of Assessment Bodies in SDI/MES is to:',opts:['A. Only recruit students','B. Assess candidates impartially for certification','C. Only provide training materials','D. Only manage funds'],ans:'B',exp:'Assessment Bodies in SDI/MES assess candidates impartially to ensure fair certification.'},
{n:870,cat:'maharashtra',tag:'Maharashtra',q:'MSSDS\'s study tours to national and international locations help:',opts:['A. Only reward MSSDS staff','B. Learn and implement best skill development practices from other regions','C. Only tourism promotion','D. Only meet government requirements'],ans:'B',exp:'Study tours help MSSDS learn and implement best skill development practices from other regions.'},
{n:871,cat:'misc',tag:'Mixed',q:'The statement "VE alleviates poverty (A is true, R is false)" refers to assertion-reason where R says:',opts:['A. VE is too expensive','B. Poverty is CAUSED by VE','C. VE creates unemployment','D. VE increases poverty'],ans:'B',exp:'The Reason (R) incorrectly claims "Poverty is because of VE" — which is false; VE actually alleviates poverty.'},
{n:872,cat:'iti',tag:'ITI',q:'IMC\'s "Academic Autonomy" allows it to:',opts:['A. Award degrees independently','B. Make curriculum and academic decisions relevant to local industry needs','C. Set its own exam patterns only','D. Appoint external examiners only'],ans:'B',exp:'Academic Autonomy allows IMC to make curriculum and academic decisions relevant to local industry needs.'},
{n:873,cat:'history',tag:'History',q:'The formation of MSDE in 2014 was significant because:',opts:['A. It replaced all other ministries','B. It created a dedicated Ministry focused exclusively on skill development','C. It was India\'s first ministry','D. It abolished ITIs'],ans:'B',exp:'MSDE creation was significant as it was India\'s first dedicated Ministry exclusively for skill development.'},
{n:874,cat:'supw',tag:'SUPW',q:'SUPW bridges the gap between:',opts:['A. Rich and poor students','B. Theory taught in classroom and practical application in community','C. Urban and rural students','D. Academic and sports students'],ans:'B',exp:'SUPW bridges the gap between theoretical classroom learning and practical application in community life.'},
{n:875,cat:'pmkvy',tag:'PMKVY',q:'The STT component of PMKVY requires assessment to be done by:',opts:['A. Training Partners themselves','B. Independent third-party Assessment Organizations','C. State Governments','D. NSDC officials'],ans:'B',exp:'STT assessment is conducted by independent third-party Assessment Organizations for objectivity.'},
{n:876,cat:'schemes',tag:'Schemes',q:'SDI MES allows workers to get certification for:',opts:['A. Only full qualifications','B. Individual modules or complete qualification packs','C. Only after completing all modules','D. Only through examination'],ans:'B',exp:'MES allows workers to get certification for individual modules or complete qualification packs.'},
{n:877,cat:'maharashtra',tag:'Maharashtra',q:'The Skill, Employment, Entrepreneurship and Innovation Dept. of Maharashtra is responsible for:',opts:['A. Only technical education','B. Overall skill ecosystem including MSSDS oversight','C. Only academic education','D. Only agricultural training'],ans:'B',exp:'This department is responsible for Maharashtra\'s overall skill ecosystem including MSSDS oversight.'},
{n:878,cat:'misc',tag:'Mixed',q:'RPL is particularly important for India because:',opts:['A. India has no informal sector','B. Millions of informal workers have skills but no formal certification','C. Only students need RPL','D. Only IT workers need RPL'],ans:'B',exp:'India has millions of informal sector workers with skills but no formal certification — RPL addresses this.'},
{n:879,cat:'iti',tag:'ITI',q:'The "accountability of user" principle in IMC means:',opts:['A. Users must pay for all services','B. ITI is accountable to industry and community who use its graduates','C. Users audit the ITI finances','D. Users set admission criteria'],ans:'B',exp:'Accountability of users means ITI is accountable to the industry and community who use its graduates.'},
{n:880,cat:'history',tag:'History',q:'Which 5-year plan period saw establishment of most ITIs in India?',opts:['A. 1st plan (1951-56)','B. 2nd and 3rd plan (1956-66) with major ITI expansion','C. 8th plan (1992-97)','D. 12th plan (2012-17)'],ans:'B',exp:'Most ITI expansion happened during the 2nd and 3rd Five-Year Plans (1956-1966).'},

{n:882,cat:'pmkvy',tag:'PMKVY',q:'PMKVY 4.0 digital platforms prevent:',opts:['A. Student enrollment','B. Fraudulent training centers and ghost beneficiaries','C. Genuine training','D. Industry participation'],ans:'B',exp:'Digital platforms in PMKVY 4.0 prevent fraudulent training centers and ghost beneficiaries.'},
{n:883,cat:'schemes',tag:'Schemes',q:'JSS target group includes persons up to Class 8 pass because:',opts:['A. Class 8 is government requirement','B. Many rural/semi-urban poor have not progressed beyond Class 8','C. Only Class 8 dropouts exist','D. ITIs require Class 8 pass'],ans:'B',exp:'Many rural/semi-urban poor populations have not had access to education beyond Class 8.'},
{n:884,cat:'maharashtra',tag:'Maharashtra',q:'WEC incubator at SNDT Women\'s University provides women entrepreneurs:',opts:['A. Only space to work','B. Mentoring, networking, resources, and growth support','C. Only certification','D. Only academic training'],ans:'B',exp:'WEC incubator at SNDT provides women entrepreneurs with mentoring, networking, resources, and growth support.'},
{n:885,cat:'misc',tag:'Mixed',q:'The Skill India Mission combines which key components?',opts:['A. Only ITIs and polytechnics','B. Formal VE (ITIs, polytechnics), short-term training (PMKVY), and recognition (RPL)','C. Only PMKVY and JSS','D. Only government training and universities'],ans:'B',exp:'Skill India Mission combines formal VE (ITIs, polytechnics), short-term training (PMKVY), and recognition (RPL).'},
{n:886,cat:'iti',tag:'ITI',q:'The NTC certificate is valid for employment in:',opts:['A. Only private sector','B. Subordinate posts in both Central and State Government services','C. Only international jobs','D. Only manufacturing sector'],ans:'B',exp:'NTC is recognized for recruitment to subordinate posts under Central and State Governments.'},

let answered = {};
let correct = 0;
let wrong = 0;

function renderQuestions(list){
  const c=document.getElementById('mcqContainer');
  c.innerHTML='';
  list.forEach(q=>{
    const div=document.createElement('div');
    div.className='mcq-card fade-in';
    div.id='q'+q.n;
    div.setAttribute('data-cat',q.cat);
    const state=answered[q.n];
    if(state==='correct') div.classList.add('answered-correct');
    else if(state==='wrong') div.classList.add('answered-wrong');
    div.innerHTML=`<div class="q-header"><span class="q-num">Q${q.n}</span><span class="q-tag">${q.tag}</span><div class="q-text">${q.q}</div></div>
    <div class="options" id="opts${q.n}">${q.opts.map((o,i)=>{
      let cls='option';const letter=o[0];
      if(state){cls+=' disabled';if(letter===q.ans)cls+=' correct';else if(state===letter)cls+=' wrong';}
      return`<button class="${cls}" onclick="selectAnswer(${q.n},'${letter}',this)"><span class="opt-label">${letter}</span>${o.substring(3)}</button>`;
    }).join('')}</div>
    <div class="explanation ${state?'show':''}" id="exp${q.n}"><strong>Explanation:</strong> ${q.exp}</div>`;
    c.appendChild(div);
  });
  updateStats();
}

function selectAnswer(n,selected,btn){
  if(answered[n])return;
  const q=questions.find(x=>x.n===n);
  answered[n]=selected;
  const opts=document.querySelectorAll(`#opts${n} .option`);
  opts.forEach(o=>{
    o.classList.add('disabled');
    if(o.querySelector('.opt-label').textContent===q.ans)o.classList.add('correct');
    else if(o===btn&&selected!==q.ans)o.classList.add('wrong');
  });
  const card=document.getElementById('q'+n);
  if(selected===q.ans){correct++;card.classList.add('answered-correct');}
  else{wrong++;card.classList.add('answered-wrong');}
  document.getElementById('exp'+n).classList.add('show');
  updateStats();
}

function updateStats(){
  const total=questions.length;
  const done=Object.keys(answered).length;
  document.getElementById('correctCount').textContent=correct;
  document.getElementById('wrongCount').textContent=wrong;
  document.getElementById('remainCount').textContent=total-done;
  const pct=done>0?Math.round((correct/done)*100):0;
  document.getElementById('scoreDisplay').textContent=`Score: ${pct}%`;
  document.getElementById('progressFill').style.width=((done/total)*100)+'%';
}

function revealAll(){
  questions.forEach(q=>{
    if(!answered[q.n]){
      answered[q.n]=q.ans;
      const opts=document.querySelectorAll(`#opts${q.n} .option`);
      opts.forEach(o=>{o.classList.add('disabled');if(o.querySelector('.opt-label').textContent===q.ans)o.classList.add('correct');});
      document.getElementById('exp'+q.n).classList.add('show');
    }
  });
  updateStats();
}

function resetAll(){answered={};correct=0;wrong=0;renderQuestions(questions);updateStats();}

function showResults(){
  const panel=document.getElementById('resultPanel');
  const done=Object.keys(answered).length;
  panel.classList.toggle('show');
  document.getElementById('resultScore').textContent=correct+'/'+done;
  const pct=done>0?Math.round((correct/done)*100):0;
  let grade=pct>=90?'🏆 Excellent!':pct>=75?'⭐ Very Good!':pct>=60?'👍 Good':pct>=45?'📚 Average':'💪 Keep Practicing';
  document.getElementById('resultSub').textContent=`${pct}% Score — ${grade} (${done} of ${questions.length} attempted)`;
}

function filterChapter(cat,btn){
  document.querySelectorAll('.ch-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('searchBox').value='';
  if(cat==='all')renderQuestions(questions);
  else renderQuestions(questions.filter(q=>q.cat===cat));
}

function searchQuestions(){
  const val=document.getElementById('searchBox').value.toLowerCase();
  if(!val){renderQuestions(questions);return;}
  renderQuestions(questions.filter(q=>q.q.toLowerCase().includes(val)||q.opts.some(o=>o.toLowerCase().includes(val))));
}

renderQuestions(questions);
</script>
